                        close5: closes.slice(-5)
                    };
                }
            } catch(e) { console.log('kline fetch failed for', item.code, e); }

            // Run scoring
            const scores = computeRuleBasedScores(stockData, klineData);
            
            // Determine signal
            let signalIcon = '🟡', signalText = '观望', actionText = '不动';

            results.push({
                code: item.code, name: parts[1] || item.name,

                signalIcon, signalText, actionText,
                signalLevel: scores.signalLevel,
                backtestWR: scores.backtestWR,
                support: klineData ? klineData.r30Low : '',
                pressure: klineData ? klineData.r30High : '',
                scores: scores
            });
            
            // Update progress

    // Render results

    // Result list
    results.forEach(function(r) {

        html += '<span class="batch-action">' + r.actionText + '</span>';
        html += '</div>';
        html += '</div>';

    html += '</div>';

async function runScan(strategy) {
    document.getElementById('scanMenu').classList.remove('show');
    if (isScanning || isAnalyzing) { showToast('请等待当前操作完成'); return; }
    isScanning = true;
    document.getElementById('scanBtn').classList.add('active');

    document.getElementById('welcomeBlock').style.display = 'none';
    document.getElementById('analysisBlock').style.display = '';
    document.getElementById('anaTitle').innerHTML = '🔍 正在扫描全A股...';
    document.getElementById('anaBody').innerHTML = '<div class="loading"><span></span><span></span><span></span></div><div style="text-align:center;color:var(--t3);font-size:12px;margin-top:8px">正在从东方财富获取实时数据</div>';
    document.getElementById('advBlock').style.display = 'none';
    document.getElementById('advBlock').innerHTML = '';
    document.getElementById('advEmpty').style.display = '';

    const strategyNames = { breakout: '🚀 突破新高', bottom: '💎 暴跌反弹', momentum: '🔥 强势突破', limit_up: '📈 涨停板' };
    const strategyName = strategyNames[strategy] || strategy;

    try {
        const fields = 'f2,f3,f4,f5,f6,f7,f8,f9,f10,f12,f14,f15,f16';
        let allStocks = [];
        let page = 1;
        const maxPages = strategy === 'limit_up' ? 3 : 5;

        // V25.7: 盘后扫描修复——盘后量比/换手率归零，排序和过滤都需要适配
        const now = new Date();
        const isAfterHours = now.getHours() >= 15 || now.getHours() < 9 || (now.getHours() === 9 && now.getMinutes() < 25);

        for (page = 1; page <= maxPages; page++) {
            try {
                let sortField = 'f3'; let sortOrder = '0';
                if (strategy === 'bottom') {
                    // V25.7: 盘后按涨跌幅排(量比全0无意义)，盘中按量比排
                    sortField = isAfterHours ? 'f3' : 'f10';
                    sortOrder = '0'; // 升序=最跌的排前面
                }
                const url = 'https://push2.eastmoney.com/api/qt/clist/get?pn=' + page + '&pz=50&po=' + sortOrder + '&np=1&fltt=2&invt=2&fid=' + sortField + '&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=' + fields + '&ut=fa5fd1943c7b386f172d6893dbfba10b';
                const data = await jsonpFetch(url, 8000);
                if (!data || !data.data || !data.data.diff || data.data.diff.length === 0) break;
                allStocks = allStocks.concat(data.data.diff);
            } catch(e) {
                console.log('Scan page ' + page + ' failed:', e.message);
                break;
            }
        }

        let filtered = allStocks.filter(function(s) {
            if (!s.f12 || !s.f14 || !s.f2 || s.f2 === '-' || s.f2 === 0) return false;
            if (s.f14 && s.f14.includes('ST')) return false;
            if (s.f14 && s.f14.startsWith('N')) return false;
            return true;
        }).map(function(s) {
            // V25.7: NaN安全处理——盘后f10/f8可能为'-'或0
            var vr = parseFloat(s.f10);
            var tr = parseFloat(s.f8);
            return {
                code: String(s.f12), name: s.f14, price: parseFloat(s.f2),
                changePct: parseFloat(s.f3), changeAmt: parseFloat(s.f4),
                volume: s.f5, turnover: s.f6, amplitude: parseFloat(s.f7),
                turnoverRate: isNaN(tr) ? 0 : tr, pe: s.f9, volumeRatio: isNaN(vr) ? 0 : vr,
                high: parseFloat(s.f15), low: parseFloat(s.f16)
            };
        });

        // V20c: 扫描策略优化(真实回测驱动)
        // V20c核心：暴跌日=反弹机会，不再清空！
        switch(strategy) {
            case 'breakout':
                filtered = filtered.filter(s => s.changePct >= 2 && s.changePct <= 7 && (isAfterHours || (s.volumeRatio >= 1.5 && s.turnoverRate >= 2 && s.turnoverRate <= 10)));
                break;
            case 'bottom':
                // V20c：暴跌反弹策略——找超跌股(回测84.8%胜率)
                // V25.7: 盘后放宽至-1%，因盘后无实时量能辅助判断
                var bottomMin = isAfterHours ? -1 : -2;
                filtered = filtered.filter(s => s.changePct >= -7 && s.changePct <= bottomMin && (isAfterHours || s.turnoverRate >= 1 && s.turnoverRate <= 8) && (s.pe !== '-' && parseFloat(s.pe) > 0));
                break;
            case 'momentum':
                filtered = filtered.filter(s => s.changePct >= 3 && s.changePct <= 7 && (isAfterHours || (s.turnoverRate >= 3 && s.turnoverRate <= 12 && s.volumeRatio >= 1)));
                break;
            case 'limit_up':
                filtered = filtered.filter(s => (s.changePct >= 9.5 && s.changePct < 100) || (s.code.startsWith('688') && s.changePct >= 19) || (s.code.startsWith('300') && s.changePct >= 19));
                break;
        }
        // V20c：暴跌日不再清空！暴跌=最强反弹机会(84.8%胜率)
        // 保留：大盘强势日追高风险大，适当减少结果
        if (_marketChg !== null && _marketChg > 1.5) {
            filtered = filtered.filter(s => s.changePct < 5); // 强势日排除追高
        }

        filtered.sort((a, b) => b.changePct - a.changePct);
        const results = filtered.slice(0, 20);
        renderScanResults(results, strategyName);
    } catch(e) {
        document.getElementById('anaBody').innerHTML = '<div class="scan-empty">❌ 扫描失败: ' + escHtml(e.message) + '<br/><br/>请稍后重试</div>';
    }

    isScanning = false;
    document.getElementById('scanBtn').classList.remove('active');
}

/* ==================== BOT API CALL ==================== */
async function callBotAPI(userContent, mode, sources) {
    isAnalyzing = true;
    document.getElementById('analyzeBtn').disabled = true;

    try {
        const response = await fetch('https://api.coze.cn/v3/chat', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + API_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                bot_id: BOT_ID,
                user_id: 'user_' + Date.now(),
                stream: true,
                auto_save_history: false,
                additional_messages: [{ role: 'user', content: userContent, content_type: 'text' }]
            })
        });
        if (!response.ok) throw new Error('API请求失败: ' + response.status);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let lastRender = 0;
        const anaBody = document.getElementById('anaBody');

        function render(text) {
            const now = Date.now();
            if (now - lastRender > 100) {
                // V11: Prepend scores + events before LLM text
                let preHtml = '';
                if (lastScores) preHtml += renderScores(lastScores);
                const events = currentStock && currentStock.data ? detectEvents(currentStock.data) : [];
                if (events.length > 0) {
                    preHtml += '<div style="margin:8px 0;padding:8px 12px;background:rgba(239,68,68,.06);border-left:3px solid var(--red);border-radius:0 6px 6px 0;font-size:12px;color:var(--red);line-height:1.5">';
                    preHtml += '<div style="font-weight:700;margin-bottom:4px">⚠️ 关键事件</div>';
                    events.forEach(function(e) { preHtml += '<div>' + escHtml(e) + '</div>'; });
                    preHtml += '</div>';
                }
                const rawHtml = typeof marked !== 'undefined' && text ? marked.parse(text) : escHtml(text);
                // V13: L层智能折叠
                const llmHtml = foldLLayers(rawHtml);
                anaBody.innerHTML = preHtml + '<hr style="border:none;border-top:1px solid var(--bd);margin:10px 0">' + llmHtml;
                document.getElementById('midSection').scrollTop = 99999;
                lastRender = now;
            }
        }

        function read() {
            reader.read().then(({ done, value }) => {
                if (done) {
                    // V12: Force-correct LLM output before rendering
                    fullText = forceCorrectLLM(fullText, lastScores);
                    render(fullText);
                    isAnalyzing = false;
                    document.getElementById('analyzeBtn').disabled = false;
                    // V12: Post-analysis validation
                    if (currentStock && currentStock.data) {
                        lastValidation = validateAnalysis(fullText, currentStock.data, null, lastScores);
                    }
                    showAdvice(fullText, mode, sources);
                    return;
                }
                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');
                let currentEvent = '';
                for (const line of lines) {
                    if (line.startsWith('event:')) currentEvent = line.slice(6).trim();
                    else if (line.startsWith('data:')) {
                        const dataStr = line.slice(5).trim();
                        if (dataStr && dataStr !== '[DONE]') {
                            try {
                                const data = JSON.parse(dataStr);
                                if (currentEvent === 'conversation.message.delta' && data.type === 'answer' && data.content) fullText += data.content;
                            } catch(e) {}
                        }
                    }
                }
                render(fullText);
                read();
            });
        }
        read();
    } catch(err) {
        document.getElementById('anaBody').textContent = '❌ 分析失败: ' + err.message + '\n\n请稍后重试。';
        isAnalyzing = false;
        document.getElementById('analyzeBtn').disabled = false;
    }
}

/* ==================== ADVICE PARSER (V11: with validation) ==================== */
function showAdvice(text, mode, sources) {
    if (!text) return;
    if (mode === 'long') showLongAdvice(text, sources);
    else showShortAdvice(text, sources);
}

function showShortAdvice(text, sources) {
    const adv = { direction: '震荡', logic: '', stopLoss: '', takeProfit: '', rating: '', risk: '', confidence: '', position: '' };
    const l1 = text.match(/【L1方向】\s*(看涨|看空|震荡)[，,]?\s*(.*)/);
    if (l1) { adv.direction = l1[1]; adv.logic = l1[2].trim(); }
    const l5 = text.match(/【L5执行】\s*(.*)/);
    if (l5) {
        const parts = l5[1].split(/[|｜]/);
        if (parts.length >= 7) {
            adv.rating = parts[0].trim(); adv.confidence = parts[1].trim();
            adv.position = parts[3].trim(); adv.stopLoss = parts[4].trim(); adv.takeProfit = parts[5].trim();
        }

    const l6 = text.match(/【L6验证】\s*(.*)/);

        const riskMatch = l6[1].match(/最大风险[：:]?\s*([^，。;；\n]+)/);

    }

    // V24: 行动指令卡 —— 1秒看懂该做什么

    let stopPrice = adv.stopLoss || '';
    
    // V25.1: 四级信号→行动指令映射（回测验证驱动）
    if (lastScores && lastScores.signalLevel === 'extreme_danger') {
        signalIcon = '⛔'; signalText = '极度危险'; actionText = '坚决回避/止损'; actionCls = 'danger';
        winRateText = '胜率≈34% 均收-1.7%';
    } else if (lastScores && lastScores.signalLevel === 'danger') {
        signalIcon = '🔴'; signalText = '偏空·危险'; actionText = '回避/减仓'; actionCls = 'danger';
        winRateText = '胜率≈39%';
    } else if (lastScores && lastScores.signalLevel === 'strong_long') {
        signalIcon = '🟢'; signalText = '偏多·强势'; actionText = '可轻仓介入'; actionCls = 'strong';
        winRateText = '胜率≈63% 均收+1.7%';
    } else {
        signalIcon = '🟡'; signalText = '观望·震荡'; actionText = '不动·等待信号'; actionCls = 'watch';
        winRateText = '胜率≈45%≈抛硬币';
    }
    
    // V25.5: 波动率分层止损（回测：假止损率12.6% vs 旧方案34.1%，胜率45.2% vs 38.6%）
    // 高波动(ATR/价格>3%)→2倍ATR止损，低波动→-3%硬止损
    if (!stopPrice && lastKline && lastKline.atr14) {
        const curPrice = currentStock && currentStock.data ? parseFloat(currentStock.data.currentPrice) : 0;
        if (curPrice > 0) {
            const atr = parseFloat(lastKline.atr14);
            const tier = lastKline.volTier;
            if (tier === 'high' && atr > 0) {
                stopPrice = (curPrice - 2 * atr).toFixed(2);
            } else {
                stopPrice = (curPrice * 0.97).toFixed(2);
            }
        }
    } else if (!stopPrice && lastKline && lastKline.r30Low) {
        const curPrice = currentStock && currentStock.data ? parseFloat(currentStock.data.currentPrice) : 0;
        if (curPrice > 0) stopPrice = (curPrice * 0.97).toFixed(2);
    } else if (!stopPrice) {
        const curPrice = currentStock && currentStock.data ? parseFloat(currentStock.data.currentPrice) : 0;
        if (curPrice > 0) stopPrice = (curPrice * 0.97).toFixed(2);
    }

    // V24: 综合评分
    const ov = lastScores ? lastScores.overall : 0;
    const dirText = lastScores ? lastScores.direction : '未知';

    let html = '<div class="adv-card">';
    html += '<div class="adv-header"><span class="adv-label">🎯 操作建议</span><span class="adv-stock">' + escHtml(currentStock ? currentStock.name + '(' + currentStock.code + ')' : '') + '</span></div>';
    
    // V24: 行动指令卡（核心！1秒看懂）
    html += '<div class="action-card ' + actionCls + '">';
    html += '<div class="action-top">';
    html += '<div class="action-signal">' + signalIcon + ' ' + signalText + '</div>';
    html += '<div class="action-score">' + (ov > 0 ? '+' : '') + ov + '分</div>';
    html += '</div>';
    html += '<div class="action-divider"></div>';
    html += '<div class="action-mid">';
    html += '<div class="action-item"><span class="action-label">🎯 行动</span><span class="action-value">' + actionText + '</span></div>';
    html += '<div class="action-item"><span class="action-label">📊 胜率</span><span class="action-value">' + winRateText + '</span></div>';
    if (stopPrice) {
        var stopDesc = lastKline && lastKline.volTier === 'high' ? '🛑 止损' : '🛑 止损';
        var stopNote = lastKline && lastKline.volTier === 'high' ? ' <span style="font-size:11px;color:var(--orange)">⚡高波动ATR止损</span>' : '';
        html += '<div class="action-item stop-item"><span class="action-label">' + stopDesc + '</span><span class="action-value stop-val">' + stopPrice + stopNote + '</span></div>';
    }
    if (lastKline && lastKline.r30High) {
        html += '<div class="action-item"><span class="action-label">📈 目标</span><span class="action-value target-val">' + lastKline.r30High + '</span></div>';
    }
    html += '</div>';
    html += '</div>';

    // V24: 关键价位精简条
    if (lastKline && lastKline.r30High && lastKline.r30Low) {
        html += '<div class="price-bar"><span class="price-label">压力</span><span class="price-val" style="color:var(--red)">' + lastKline.r30High + '</span><span style="color:var(--bd)">|</span><span class="price-label">支撑</span><span class="price-val" style="color:var(--green)">' + lastKline.r30Low + '</span></div>';
    }

    // V24: 仓位超配提醒
    if (ov >= 5 && lastScores && lastScores.signalLevel !== 'strong_long') {
        html += '<div class="position-warn">⚠️ 评分偏高但未达强多信号，注意仓位控制，建议≤50%</div>';
    }
    if (ov >= 2 && ov < 5 && lastScores && lastScores.signalLevel === 'watch') {

    }
    if (adv.takeProfit) {
        html += '<div class="adv-row"><span class="adv-key">📈 目标</span><span class="adv-val target">' + escHtml(adv.takeProfit) + '</span></div>';
    }
    if (adv.confidence || adv.position) {
        html += '<div class="adv-row">';
        if (adv.confidence) html += '<span class="adv-key">置信度</span><span class="adv-val">' + escHtml(adv.confidence) + '</span>';
        if (adv.position) html += '<span class="adv-key" style="margin-left:16px">建议仓位</span><span class="adv-val">' + escHtml(adv.position) + '</span>';
        html += '</div>';
    }
    if (adv.logic) html += '<div class="adv-logic">💡 ' + escHtml(adv.logic) + '</div>';
    if (adv.risk) html += '<div class="adv-risk">⚠️ ' + escHtml(adv.risk) + '</div>';

    // V12: Validation warnings
    if (lastValidation && lastValidation.length > 0) {
        html += renderValidationWarnings(lastValidation);
    }

    // V12: Show force corrections
    if (_lastCorrections && _lastCorrections.length > 0) {
        html += '<div class="val-warn" style="background:rgba(245,158,11,.06);border-left-color:var(--yellow)">';
        html += '<div style="font-weight:700;margin-bottom:4px;color:var(--yellow)">🔧 规则自动纠偏</div>';
        _lastCorrections.forEach(function(c) {
            html += '<div style="color:var(--yellow)">' + escHtml(c) + '</div>';
        });
        html += '</div>';
    }

    html += '<div class="adv-disclaimer">⚠️ 仅供参考，不构成投资建议。决策权在用户本人。</div>';
    if (sources && sources.length > 0) {
        html += '<div class="data-sources">数据源：';
        html += sources.map(function(s) { return '<span class="' + (s.ok ? 'ok' : 'fail') + '">' + s.label + (s.ok ? '✓' : '✗') + '</span>'; }).join('');
        html += '</div>';
    }
    html += '</div>';

    document.getElementById('advEmpty').style.display = 'none';
    const advBlock = document.getElementById('advBlock');
    advBlock.style.display = '';
    advBlock.innerHTML = html;
}

function showLongAdvice(text, sources) {
    const adv = { value: '', growth: '' };
    const valMatch = text.match(/【估值分析】\s*(.*)/s);
    if (valMatch) adv.value = valMatch[1].trim().substring(0, 60);
    const growMatch = text.match(/【成长性】\s*(.*)/s);
    if (growMatch) adv.growth = growMatch[1].trim().substring(0, 60);

    let entryZone = '', targetPrice = '', holdPeriod = '';
    const entryMatch = text.match(/建仓区间[：:]?\s*([^，。;；\n]+)/);
    if (entryMatch) entryZone = entryMatch[1].trim();
    const targetMatch = text.match(/目标价[位]?[：:]?\s*([^，。;；\n]+)/);
    if (targetMatch) targetPrice = targetMatch[1].trim();
    const periodMatch = text.match(/持有周期[：:]?\s*([^，。;；\n]+)/);
    if (periodMatch) holdPeriod = periodMatch[1].trim();

    let html = '<div class="lt-card">';
    html += '<div class="lt-title">📌 长线跟踪建议 · ' + escHtml(currentStock ? currentStock.name + '(' + currentStock.code + ')' : '') + '</div>';
    if (entryZone || targetPrice || holdPeriod) {

        html += '<div class="lt-row"><span class="lt-key">🎯 目标价位</span><span class="lt-val">' + escHtml(targetPrice || '—') + '</span></div>';
        html += '<div class="lt-row"><span class="lt-key">⏳ 持有周期</span><span class="lt-val">' + escHtml(holdPeriod || '—') + '</span></div>';
    }

    // V11: Show rule score for long-term + backtest WR
    if (lastScores) {
        html += '<div class="lt-row"><span class="lt-key">📊 规则评分</span><span class="lt-val">综合' + (lastScores.overall > 0 ? '+' : '') + lastScores.overall + ' ' + lastScores.direction + '</span></div>';
        if (lastScores.backtestWR) {
            html += '<div class="lt-row"><span class="lt-key">📉 回测胜率</span><span class="lt-val">' + escHtml(lastScores.backtestWR) + '</span></div>';
        }

    if (adv.value) html += '<div class="lt-logic">📊 ' + escHtml(adv.value) + '</div>';
    if (adv.growth) html += '<div class="lt-logic" style="border-left-color:var(--green)">📈 ' + escHtml(adv.growth) + '</div>';

    // V12: Validation warnings
    if (lastValidation && lastValidation.length > 0) {
        html += renderValidationWarnings(lastValidation);
    }

    // V12: Show force corrections
    if (_lastCorrections && _lastCorrections.length > 0) {
        html += '<div class="val-warn" style="background:rgba(245,158,11,.06);border-left-color:var(--yellow)">';
        html += '<div style="font-weight:700;margin-bottom:4px;color:var(--yellow)">🔧 规则自动纠偏</div>';
        _lastCorrections.forEach(function(c) {
            html += '<div style="color:var(--yellow)">' + escHtml(c) + '</div>';
        });
        html += '</div>';
    }

    html += '<div class="adv-disclaimer">⚠️ 长线分析基于当前数据，建议定期更新。不构成投资建议。</div>';
    if (sources && sources.length > 0) {
        html += '<div class="data-sources">数据源：';
        html += sources.map(function(s) { return '<span class="' + (s.ok ? 'ok' : 'fail') + '">' + s.label + (s.ok ? '✓' : '✗') + '</span>'; }).join('');
        html += '</div>';
    }
    html += '</div>';

    document.getElementById('advEmpty').style.display = 'none';
    const advBlock = document.getElementById('advBlock');
    advBlock.style.display = '';
    advBlock.innerHTML = html;
}

/* ==================== UTILS ==================== */
function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ====== V25.7 分化监控（Pearson独创）======
function toKlineObj(arr){if(!arr||arr.length<6)return null;return{date:arr[0],open:parseFloat(arr[1]),high:parseFloat(arr[3]),low:parseFloat(arr[4]),close:parseFloat(arr[2]),vol:parseInt(arr[5])||0};}
async function getIndexKline(code,days){var m=code.startsWith('6')||code.startsWith('9')?'sh':'sz';var url='https://ifzq.gtimg.cn/appstock/app/fqkline/get?param='+m+code+',day,,,'+days+',qfq';var r=await fetch(url);var j=await r.json();var d=j&&j.data&&j.data[m+code];var arr=d&&(d.qfqday||d.day)||[];return arr.map(toKlineObj).filter(Boolean);}
function pearsonR(x,y){var n=x.length;if(n<3)return null;var sx=0,sxy=0,sxx=0,sy=0,syy=0;for(var i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sxx+=x[i]*x[i];syy+=y[i]*y[i];}var num=n*sxy-sx*sy,den=Math.sqrt((n*sxx-sx*sx)*(n*syy-sy*sy));return den===0||isNaN(num/den)?0:num/den;}
function calcDiv(sk,ik,nd){var sum=0;var start=Math.max(0,sk.length-nd);for(var i=start;i<sk.length;i++){if(i<1)continue;sum+=(sk[i].close-sk[i-1].close)/sk[i-1].close*100-(ik[i].close-ik[i-1].close)/ik[i-1].close*100;}return sum;}
function divSig(dd,c5,c10,rs20,b20,p20){var s=0,list=[];if(dd!==null){if(dd<-5){s+=3;list.push('日极');}else if(dd<-2){s+=1;list.push('日警');}}if(c5<-10){s+=3;list.push('5极');}else if(c5<-5){s+=2;list.push('5警');}if(c10<-15){s+=3;list.push('10极');}else if(c10<-8){s+=2;list.push('10警');}if(rs20!==null&&rs20<0.5)s+=2;if(b20>=5){s+=3;list.push('B20');}if(p20!==null&&p20<0.3){s+=2;list.push('P20独');}var lv='观望';if(s>=8)lv='高危分化';else if(s>=4)lv='偏空分化';return{score:s,level:lv,detail:list.join('/')};}
async function runDiv(stockCode,klineData){try{var idxCode=stockCode.startsWith('6')?'sh000001':'sz399001';var idxK=await getIndexKline(idxCode,80);if(!idxK||idxK.length<60)return;var sk=klineData,ik=idxK;var dd=(sk[sk.length-1].close-sk[sk.length-2].close)/sk[sk.length-2].close*100-(ik[ik.length-1].close-ik[ik.length-2].close)/ik[ik.length-2].close*100;var c5=calcDiv(sk,ik,5),c10=calcDiv(sk,ik,10);var rs20=null,b20=0,p20=null;if(sk.length>=21&&ik.length>=21){var sr=(sk[sk.length-1].close-sk[sk.length-20].close)/sk[sk.length-20].close;var ir=(ik[ik.length-1].close-ik[ik.length-20].close)/ik[ik.length-20].close;rs20=ir!==0?sr/ir:null;for(var i=Math.max(0,sk.length-20);i<sk.length;i++){if(i<1)continue;if((sk[i].close-sk[i-1].close)/sk[i-1].close*100<(ik[i].close-ik[i-1].close)/ik[i-1].close*100)b20++;}}var x=[],y=[];for(var i=0;i<sk.length;i++){if(i>0)x.push((sk[i].close-sk[i-1].close)/sk[i-1].close);else x.push(0);}for(var i=0;i<ik.length;i++){if(i>0)y.push((ik[i].close-ik[i-1].close)/ik[i-1].close);else y.push(0);}var p10=pearsonR(x.slice(-10),y.slice(-10));var p60=x.length>=60&&y.length>=60?pearsonR(x.slice(-60),y.slice(-60)):null;p20=pearsonR(x.slice(-20),y.slice(-20));var sig=divSig(dd,c5,c10,rs20,b20,p20);var p=document.getElementById('divergence-panel');if(p){p.style.display='block';var el=document.getElementById('val-dd');if(el)el.textContent=dd.toFixed(2);var ec5=document.getElementById('val-c5');if(ec5)ec5.textContent=c5.toFixed(1);var ec10=document.getElementById('val-c10');if(ec10)ec10.textContent=c10.toFixed(1);var eb20=document.getElementById('val-b20');if(eb20)eb20.textContent=b20;var es=document.getElementById('val-sig');if(es)es.textContent=sig.level;var esc=document.getElementById('val-score');if(esc)esc.textContent='评分:'+sig.score;var ep10=document.getElementById('val-p10');if(ep10)ep10.textContent=p10!==null?p10.toFixed(2):'-';var ep20=document.getElementById('val-p20');if(ep20)ep20.textContent=p20!==null?p20.toFixed(2):'-';var ep60=document.getElementById('val-p60');if(ep60)ep60.textContent=p60!==null?p60.toFixed(2):'-';}}catch(e){console.error('DivError:',e);}}
</script>
