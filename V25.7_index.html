    <script type="text/template" id="tpl-short-prompt">你是A股分析师，严格基于下方【真实数据】分析，禁止编造任何数据。按7层漏斗格式输出，每层1-2行只出结论：
【L0预判】政策/风险/主力/资金/散户各1句+预期差(仅列≥4星)
【L1方向】看涨/看空/震荡+1句核心逻辑+有无前置否决
【L2结构】趋势+中枢区间+买卖点+有无背驰(1行)
【L3确认】5理论各1词(看涨/看空/中性)+确认度X/5(1行)
【L4博弈】主力意图1句+止损位+散户情绪1句(2行)
【L5执行】评级|置信度|方向|仓位|止损|止盈|盈亏比|建议持有X日(1行)
【L6验证】胜率参考+最大风险+下次检查(1行)

硬约束：
(1)所有价格必须来自【真实数据】，不得编造。没有的数据标[缺]
(2)冲高回落+长上影=看跌信号，非看涨
(3)涨停炸板=抛压重，非强势
(4)放量不封板=出货嫌疑
(5)量价背离必须标注
(6)【规则评分】中的客观评分必须尊重——如果趋势评分=-3(空头)，L1方向不得写"看涨"；如果动量评分≤-2，L5评级不得写"买入"；信号评分≥2时L1不得写"看空"
(7)不确定的内容标[待核实]，不要猜测
(8)总输出≤500字
(9)止损纪律：任何评级下，入场后-3%无条件止损
(10)L6信号层权重最大(回测：去掉L6胜率降7.5%)，金叉/突破信号必须重视
(11)过热区(30日高位>85%)的股票不得写"买入"，必须标注过热风险
(12)大盘暴跌(跌幅>2%)时，L5不得写"买入"或"强烈推荐"
(13)非涨停但涨幅>7%=冲高回落风险，不得写"看涨"
(14)L5必须写明建议持有天数(1/3/5/10日)，基于信号强度：强信号1日，中等3日，弱信号观望
(15)V12新增：基本面PE评分≤-1时，L5不得写"强烈推荐"；PE高估(>80)时须标注估值风险
(16)V12新增：趋势收敛(MA5-MA20间距<1%)=变盘在即，L2必须标注"变盘预警"
(17)V12新增：你的输出将被规则引擎强制校验——与规则评分矛盾的判断会被自动替换，请务必尊重规则评分
(18)V13新增：行业景气度评分≤-1时，L5不得写"强烈推荐"；行业低迷时须标注行业风险
(19)V20c新增：板块热度评分≤-1(板块拖累)时，L5不得写"强烈推荐"；板块冷+高分需标注"板块未共振"风险
(20)V20e新增：大盘1%-2%(追涨死亡区)+高分→不得写"强烈推荐"；大盘真强(>1.5%)+高分→大盘共振加分
(21)V20f新增：关注股评分变化追踪，方向变化⚡标记，自动更新评分快照
(22)V25.1四级信号制——🟢偏多(≥8,胜率63%)/🟡观望(中间)/🔴偏空(≤-4,胜率39%)/⛔极危(≤-7,胜率34%)；🟡观望时L5必须写"观望·不操作"；🔴避雷时L5必须写"远离·不碰"；🟢强多时L5写"可轻仓介入·3日短线"
(23)V21新增：L5必须显示历史胜率数据（如"同条件历史胜率约XX%"）
(24)V21新增：散户第一使命是不亏钱——避雷信号比选股信号更重要，L5优先标注风险

行业对比：如提供行业信息，需判断该股表现是否优于行业均值。已涨20天以上的行业不代表继续涨，可能过热回调。

        .search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,.12)}
        .btn{border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldD));color:#0a0e17}
        .btn-gold:hover{box-shadow:0 4px 12px rgba(212,160,23,.3);transform:translateY(-1px)}
        .btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-outline{background:transparent;border:1px solid var(--bd);color:var(--t2);padding:8px 12px;font-size:12px}
        .btn-outline:hover{border-color:var(--goldD);color:var(--gold)}
        .btn-outline.active{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.08)}
        .btn-scan{background:transparent;border:1px solid var(--goldD);color:var(--gold);padding:8px 12px;font-size:12px}
        .btn-scan:hover{background:rgba(212,160,23,.1);box-shadow:0 2px 8px rgba(212,160,23,.2)}
        .btn-scan.active{background:rgba(212,160,23,.15);border-color:var(--gold)}

        /* Tabs */
        .tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid var(--bd)}
        .tab{padding:6px 16px;font-size:12px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
        .tab:hover{color:var(--t2)}
        .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

        /* Chips */
        .chips{display:flex;gap:6px;flex-wrap:wrap;min-height:28px;align-items:center}
        .chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:4px 10px 4px 12px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .2s;max-width:120px}
        .chip:hover{border-color:var(--goldD);color:var(--gold);background:var(--bg2h)}
        .chip .chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .chip .chip-x{font-size:10px;color:var(--t3);cursor:pointer;padding:0 2px;flex-shrink:0}
        .chip .chip-x:hover{color:var(--red)}
        .chip-longterm{border-left:3px solid var(--blue)}
        .chips-empty{font-size:11px;color:var(--t3);font-style:italic}

        /* === SECTOR HOTNESS === */
        .sector-hotness{margin-top:10px;border-top:1px solid var(--bd);padding-top:8px}
        .sector-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
        .sector-title-text{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.5px}
        .btn-refresh-mini{background:none;border:1px solid var(--bd);color:var(--t3);font-size:12px;padding:1px 6px;border-radius:6px;cursor:pointer;transition:all .2s}
        .btn-refresh-mini:hover{border-color:var(--gold);color:var(--gold)}
        .sector-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
        .sector-scroll::-webkit-scrollbar{height:3px}
        .sector-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
        .sector-loading{font-size:11px;color:var(--t3);padding:4px 8px}
        .sector-card{flex-shrink:0;min-width:90px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid var(--bd);position:relative}
        .sector-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
        .sector-card.hot{background:linear-gradient(135deg,#3a1a1a,#2a1010);border-color:#5a2020}
        .sector-card.warm{background:linear-gradient(135deg,#2a2010,#221a0a);border-color:#4a3a15}
        .sector-card.cool{background:linear-gradient(135deg,#101a2a,#0a1522);border-color:#152a4a}
        .sector-card.cold{background:linear-gradient(135deg,#0a1520,#0a1020);border-color:#1a2030}
        .sector-name{font-size:11px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
        .sector-chg{font-size:13px;font-weight:700;margin-top:2px}
        .sector-chg.up{color:var(--green)}
        .sector-chg.down{color:var(--red)}
        .sector-chg.flat{color:var(--t3)}
        .sector-fund{font-size:9px;color:var(--t3);margin-top:1px;white-space:nowrap}
        .sector-detail{margin-top:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
        .sector-detail-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:4px}
        .sector-detail-close{margin-left:auto;cursor:pointer;color:var(--t3);font-size:14px}
        .sector-detail-close:hover{color:var(--red)}
        .sector-leader-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}
        .sector-leader-icon.dragon{color:var(--gold)}
        .sector-leader-icon.sub{color:#c0c0c0}
        .sector-leader-icon.follow{color:var(--t3)}
        .sector-leader-icon.weak{color:var(--red)}
        .sector-leader-name{font-size:12px;color:var(--t1);cursor:pointer;flex:1}
        .sector-leader-name:hover{color:var(--gold)}
        .sector-leader-chg{font-size:12px;font-weight:600;flex-shrink:0}
        .sector-leader-chg.up{color:var(--green)}
        .sector-leader-chg.down{color:var(--red)}
        .sector-leader-tag{font-size:9px;padding:1px 5px;border-radius:4px;flex-shrink:0}
        .sector-leader-tag.dragon{background:rgba(212,160,23,.15);color:var(--gold)}
        .sector-leader-tag.sub{background:rgba(192,192,192,.12);color:#c0c0c0}
        .sector-leader-tag.follow{background:rgba(255,255,255,.06);color:var(--t3)}
        .sector-leader-tag.weak{background:rgba(239,68,68,.1);color:var(--red)}
        /* V20c: Dragon Score & Enhanced Detail */
        .sector-leader-row{display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
        .sector-leader-row:last-child{border-bottom:none}
        .sector-leader-row.dragon-row{background:linear-gradient(90deg,rgba(212,160,23,.06),transparent);border-radius:4px;padding:5px 4px;margin:0 -4px}
        .sector-rank{font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0;width:18px;text-align:center}
        .sector-leader-score{flex-shrink:0;width:50px;display:flex;flex-direction:column;gap:1px}
        .sector-score-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
        .sector-score-fill{height:100%;border-radius:2px;transition:width .3s}
        .sector-score-fill.dragon{background:linear-gradient(90deg,#d4a017,#ffd700)}
        .sector-score-fill.sub{background:linear-gradient(90deg,#808080,#c0c0c0)}
        .sector-score-fill.follow{background:linear-gradient(90deg,#4a5568,#718096)}
        .sector-score-fill.weak{background:linear-gradient(90deg,#7f1d1d,#ef4444)}
        .sector-score-text{font-size:8px;color:var(--t3);text-align:right}
        .sector-dims{display:flex;gap:3px;flex-shrink:0}
        .sector-dim{font-size:8px;padding:0 3px;border-radius:3px;white-space:nowrap}
        .sector-dim.chg{background:rgba(74,222,128,.1);color:#4ade80}
        .sector-dim.fund{background:rgba(96,165,250,.1);color:#60a5fa}
        .sector-dim.vol{background:rgba(251,191,36,.1);color:#fbbf24}
        .sector-dim.seal{background:rgba(192,132,252,.1);color:#c084fc}
        /* V20c: Catalyst Feed */
        .sector-catalyst{margin-top:6px;border-top:1px dashed rgba(255,255,255,.08);padding-top:6px}
        .sector-catalyst-title{font-size:10px;color:var(--gold);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:3px}
        .sector-news-item{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}
        .sector-news-item:last-child{border-bottom:none}
        .sector-news-time{font-size:9px;color:var(--t3);flex-shrink:0}
        .sector-news-title{font-size:10px;color:var(--t1);line-height:1.4;cursor:pointer}
        .sector-news-title:hover{color:var(--gold)}
        .sector-news-src{font-size:8px;color:var(--t3);margin-left:4px}
        .sector-news-row{display:flex;gap:5px;align-items:baseline}

        /* === SCAN DROPDOWN === */
        .scan-dropdown{position:relative;display:inline-block}
        .scan-menu{display:none;position:absolute;top:100%;right:0;margin-top:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:6px 0;min-width:200px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4)}
        .scan-menu.show{display:block}
        .scan-menu-item{padding:10px 16px;font-size:13px;color:var(--t1);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
        .scan-menu-item:hover{background:var(--bg2h);color:var(--gold)}
        .scan-menu-item .scan-icon{font-size:16px;flex-shrink:0}
        .scan-menu-item .scan-text{flex:1}
        .scan-menu-item .scan-desc{font-size:10px;color:var(--t3);display:block;margin-top:2px}

        /* === MIDDLE SECTION === */
        .mid{flex:45;overflow-y:auto;padding:16px 20px;background:var(--bg0);min-height:0}
        .mid::-webkit-scrollbar{width:4px}
        .mid::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

        /* Welcome */
        .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
        .welcome-icon{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(212,160,23,.25))}
        .welcome-t{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:6px}
        .welcome-s{font-size:14px;color:var(--t2);max-width:420px;line-height:1.6}

        /* Analysis card */
        .ana-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}
        .ana-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .ana-body{line-height:1.7;font-size:13px}
        .ana-body h1{color:var(--gold);margin:14px 0 8px;font-size:16px;border-bottom:1px solid var(--goldD);padding-bottom:4px}
        .ana-body h2{color:var(--goldL);margin:12px 0 6px;font-size:14px}
        .ana-body strong{color:var(--goldL)}
        .ana-body em{color:var(--t2);font-style:normal}
        .ana-body code{background:rgba(212,160,23,.1);padding:1px 4px;border-radius:3px;font-size:12px;color:var(--gold)}
        .ana-body ul,.ana-body ol{padding-left:18px;margin:4px 0}
        .ana-body li{margin:2px 0}
        .ana-body blockquote{border-left:3px solid var(--goldD);padding-left:10px;margin:6px 0;color:var(--t2)}
        .ana-body hr{border:none;border-top:1px solid var(--bd);margin:10px 0}
        .ana-body table{border-collapse:collapse;margin:6px 0;width:100%}
        .ana-body th,.ana-body td{border:1px solid var(--bd);padding:4px 8px;text-align:left;font-size:12px}

        /* Score bar */
        .score-bar{display:flex;align-items:center;gap:8px;margin:8px 0;padding:8px 12px;background:var(--bg0);border-radius:8px;border:1px solid var(--bd)}
        .score-label{font-size:11px;color:var(--t3);min-width:36px}
        .score-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;position:relative;overflow:hidden}
        .score-fill{height:100%;border-radius:3px;transition:width .5s ease}
        .score-fill.bull{background:linear-gradient(90deg,var(--green),#4ade80)}
        .score-fill.bear{background:linear-gradient(90deg,var(--red),#f87171)}
        .score-fill.neutral{background:linear-gradient(90deg,var(--yellow),#facc15)}
        .score-val{font-size:12px;font-weight:700;min-width:28px;text-align:right}
        .score-val.bull{color:var(--green)}
        .score-val.bear{color:var(--red)}
        .score-val.neutral{color:var(--yellow)}
        .score-summary{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
        .score-chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
        .score-chip.bull{background:var(--greenBg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
        .score-chip.bear{background:var(--redBg);color:var(--red);border:1px solid rgba(239,68,68,.2)}
        .score-chip.neutral{background:var(--yellowBg);color:var(--yellow);border:1px solid rgba(234,179,8,.2)}

        /* Validation warning */
        .val-warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 12px;margin:8px 0;font-size:12px;color:var(--red);line-height:1.5}

        /* Loading */
        .loading{display:flex;gap:4px;padding:8px 0;justify-content:center}
        .loading span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dotPulse 1.4s infinite both}
        .loading span:nth-child(2){animation-delay:.2s}
        .loading span:nth-child(3){animation-delay:.4s}
        @keyframes dotPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

        /* === SCAN RESULTS === */
        .scan-result{margin-bottom:12px}
        .scan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .scan-title{font-size:14px;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:6px}
        .scan-count{font-size:11px;color:var(--t3);background:var(--bg2);padding:2px 8px;border-radius:10px}
        .scan-list{display:flex;flex-direction:column;gap:6px}
        .scan-item{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .15s}
        .scan-item:hover{border-color:var(--purple);background:var(--bg2h);transform:translateX(2px)}
        .scan-item-left{flex:1;min-width:0}
        .scan-item-name{font-size:14px;font-weight:700;color:var(--t1)}
        .scan-item-code{font-size:11px;color:var(--t3);margin-left:6px}
        .scan-item-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
        .scan-tag{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
        .scan-tag.up{background:var(--greenBg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
        .scan-tag.down{background:var(--redBg);color:var(--red);border:1px solid rgba(239,68,68,.2)}
        .scan-tag.info{background:var(--blueBg);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
        .scan-item-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
        .scan-item-price{font-size:14px;font-weight:700}
        .scan-item-price.up{color:var(--green)}
        .scan-item-price.down{color:var(--red)}
        .scan-item-pct{font-size:12px;font-weight:600}
        .scan-item-pct.up{color:var(--green)}
        .scan-item-pct.down{color:var(--red)}
        .scan-item-action{font-size:11px;color:var(--purple);margin-top:2px;opacity:0;transition:opacity .15s}
        .scan-item:hover .scan-item-action{opacity:1}
        .scan-empty{text-align:center;color:var(--t3);font-size:13px;padding:20px}

        /* === BOTTOM SECTION === */
        .bot{background:var(--bg1);border-top:1px solid var(--bd);padding:14px 20px;flex:55;min-height:0;max-height:none;overflow-y:auto}
        .bot-empty{text-align:center;color:var(--t3);font-size:12px;padding:20px 0}
        .adv-card{border-radius:10px;padding:12px 16px;border:1px solid var(--bd)}
        .adv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .adv-label{font-size:12px;color:var(--t2);font-weight:600}
        .adv-stock{font-size:12px;color:var(--t3)}
        .adv-rating{font-size:28px;font-weight:800;text-align:center;padding:6px 0;border-radius:8px;margin-bottom:8px;letter-spacing:2px}
        .adv-rating.buy{color:var(--green);background:var(--greenBg);border:1px solid rgba(34,197,94,.3)}
        .adv-rating.hold{color:var(--blue);background:var(--blueBg);border:1px solid rgba(59,130,246,.3)}
        .adv-rating.watch{color:var(--yellow);background:var(--yellowBg);border:1px solid rgba(234,179,8,.3)}
        .adv-rating.sell{color:var(--red);background:var(--redBg);border:1px solid rgba(239,68,68,.3)}
        /* V24: 行动指令卡 */
        .action-card{border-radius:12px;padding:14px 16px;margin-bottom:10px;border:2px solid var(--bd);background:linear-gradient(135deg,var(--bg2),var(--bg1))}
        .action-card.strong{border-color:var(--green);background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,197,94,.02))}
        .action-card.danger{border-color:var(--red);background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.02))}
        .action-card.danger .action-signal{color:#ef4444;text-shadow:0 0 8px rgba(239,68,68,.3)}
        .action-card.watch{border-color:var(--yellow);background:linear-gradient(135deg,rgba(234,179,8,.06),rgba(234,179,8,.02))}
        .action-top{display:flex;align-items:center;justify-content:space-between}
        .action-signal{font-size:20px;font-weight:900;letter-spacing:1px}
        .action-card.strong .action-signal{color:var(--green)}
        .action-card.danger .action-signal{color:var(--red)}
        .action-card.watch .action-signal{color:var(--yellow)}
        .action-score{font-size:24px;font-weight:900;color:var(--gold)}
        .action-divider{height:1px;background:var(--bd);margin:10px 0;opacity:.5}
        .action-mid{display:flex;flex-direction:column;gap:6px}
        .action-item{display:flex;align-items:center;justify-content:space-between;font-size:14px}
        .action-label{color:var(--t3);font-size:12px}
        .action-value{font-weight:700}
        .stop-item .stop-val{color:var(--red);font-size:16px;font-weight:900;letter-spacing:1px}
        .target-val{color:var(--green);font-weight:700}
        /* V24: 价位条 */
        .price-bar{display:flex;align-items:center;justify-content:center;gap:12px;font-size:12px;padding:6px 0;margin-bottom:6px;color:var(--t3)}
        .price-bar .price-label{font-size:11px}
        .price-bar .price-val{font-weight:700}
        /* V24: 仓位提醒 */
        .position-warn{font-size:12px;color:var(--yellow);background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:8px;padding:8px 12px;margin-top:6px;text-align:center;font-weight:600}
        .adv-row{display:flex;gap:12px;margin-bottom:4px;font-size:12px;align-items:center}
        .adv-row .adv-key{color:var(--t3);min-width:40px}
        .adv-row .adv-val{color:var(--t1);font-weight:600}
        .adv-row .adv-val.stop{color:var(--red);font-size:18px;font-weight:800;background:rgba(239,68,68,.12);padding:2px 8px;border-radius:4px}
        .adv-row .adv-val.target{color:var(--green);font-size:15px;font-weight:700}
        /* V13: Stop-loss highlight box */
        .stop-box{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.03));border:2px solid rgba(239,68,68,.5);border-radius:10px;padding:12px 16px;margin:8px 0;text-align:center}
        .stop-box-label{font-size:11px;color:var(--t3);margin-bottom:2px}
        .stop-box-val{font-size:26px;font-weight:900;color:var(--red);letter-spacing:2px;text-shadow:0 0 10px rgba(239,68,68,.25)}
        .stop-box-note{font-size:10px;color:var(--red);margin-top:3px;opacity:.8}
        /* V13: L-layer collapsible */
        .l-layer{border:1px solid var(--bd);border-radius:8px;margin:4px 0;overflow:hidden}
        .l-layer-header{padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;user-select:none}
        .l-layer-header:hover{background:var(--bg2h)}
        .l-layer-header .l-arrow{transition:transform .2s;font-size:9px}
        .l-layer-header.expanded .l-arrow{transform:rotate(90deg)}
        .l-layer-body{padding:0 12px 8px;font-size:12px;line-height:1.6;color:var(--t2);display:none}
        .l-layer-body.show{display:block}
        .l-layer.l-expanded .l-layer-body{display:block}
        .l-layer.l-expanded .l-layer-header{border-bottom:1px solid var(--bd)}
        .l-key-label{display:inline-block;min-width:48px;color:var(--gold);font-weight:600}
        .l-layer-header.l-dir-up{color:var(--green)}
        .l-layer-header.l-dir-down{color:var(--red)}
        .l-layer-header.l-dir-neutral{color:var(--yellow)}
        /* V13: Chip with pct color */
        .chip-pct{font-size:10px;font-weight:700;margin-left:3px}
        .chip-pct.up{color:var(--red)}
        .chip-pct.down{color:var(--green)}
        .chip.up-bg{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.25)}
        .chip.down-bg{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.25)}
        .adv-logic{font-size:12px;color:var(--t2);margin:6px 0;padding:6px 10px;background:rgba(212,160,23,.06);border-left:3px solid var(--goldD);border-radius:0 6px 6px 0;line-height:1.5}
        .adv-risk{font-size:12px;color:var(--red);margin-top:4px;display:flex;align-items:flex-start;gap:4px}
        .adv-disclaimer{font-size:10px;color:var(--t3);text-align:center;margin-top:6px}
        .data-sources{font-size:10px;color:var(--t3);text-align:center;margin-top:4px}
        .data-sources span{margin:0 3px}
        .data-sources .ok{color:var(--green)}
        .data-sources .fail{color:var(--red)}

/* ==================== V11: RETRY + FALLBACK ==================== */
async function fetchWithRetry(fn, maxRetries, delayMs) {
    maxRetries = maxRetries || 2;
    delayMs = delayMs || 1000;
    let lastErr = null;
    for (let i = 0; i <= maxRetries; i++) {
        try {
            const result = await fn();
            if (result) return result;
            throw new Error('empty result');
        } catch(e) {
            lastErr = e;
            if (i < maxRetries) {
                await new Promise(r => setTimeout(r, delayMs * (i + 1)));
            }
        }
    }
    return null;
}

/* ==================== V11: DATA VALIDATION ==================== */
function validateStockData(data) {
    if (!data) return null;
    const price = parseFloat(data.currentPrice);
    const lastClose = parseFloat(data.lastClose);
    const high = parseFloat(data.high);
    const low = parseFloat(data.low);
    const open = parseFloat(data.openPrice);
    const changePct = parseFloat(data.changePct);
    const turnoverRate = parseFloat(data.turnoverRate);

    // Basic sanity checks
    if (isNaN(price) || price <= 0) return null;
    if (isNaN(lastClose) || lastClose <= 0) return null;
    if (isNaN(high) || isNaN(low)) return null;

    // Fix: high should be >= max(open, close), low should be <= min(open, close)
    const maxPrice = Math.max(open || price, price);
    const minPrice = Math.min(open || price, price);
    if (high < maxPrice) data.high = String(maxPrice);
    if (low > minPrice) data.low = String(minPrice);

    // Change% sanity: allow up to ±20% for normal, ±5% for ST
    if (Math.abs(changePct) > 25) {
        // Recalculate from price and lastClose
        const recalced = ((price - lastClose) / lastClose * 100);
        data.changePct = recalced.toFixed(2);
    }

    // TurnoverRate sanity
    if (isNaN(turnoverRate) || turnoverRate < 0) data.turnoverRate = '0';
    if (turnoverRate > 80) data.turnoverRate = String(Math.min(turnoverRate, 80));

    return data;
}

        const pos = kline.pricePos || '';
        if (pos.includes('MA5上MA20上')) scores.trend.val = Math.min(scores.trend.val + 1, 3);
        else if (pos.includes('MA5下MA20下')) scores.trend.val = Math.max(scores.trend.val - 1, -3);
        // V12: Trend velocity - MA间距扩散(趋势加速) vs 收敛(趋势衰竭)
        if (kline.ma5 && kline.ma10 && kline.ma20) {
            var m5 = parseFloat(kline.ma5), m10 = parseFloat(kline.ma10), m20 = parseFloat(kline.ma20);
            var spread = Math.abs(m5 - m20) / m20 * 100;
            if (spread > 3) {
                if (m5 > m20) { scores.trend.desc += ' | 趋势加速(MA5-MA20间距' + spread.toFixed(1) + '%)'; }
                else { scores.trend.desc += ' | 跌势加速(MA5-MA20间距' + spread.toFixed(1) + '%)'; }
            } else if (spread < 1) {
                scores.trend.desc += ' | 趋势收敛(间距' + spread.toFixed(1) + '%)，变盘在即';
            }
        }

        // V20c: L6信号权重x1.5 (实测:信号层贡献居中)
        if (kline.crossSignal) {
            if (kline.crossSignal.includes('金叉')) {
                scores.trend.val = Math.min(scores.trend.val + 1, 3);
                scores.signal.val = Math.min(scores.signal.val + 2, 3);
                scores.signal.label = '金叉'; scores.signal.desc = 'MA金叉，中期看涨信号';
            }
            if (kline.crossSignal.includes('死叉')) {
                scores.trend.val = Math.max(scores.trend.val - 1, -3);
                scores.signal.val = Math.max(scores.signal.val - 2, -3);
                scores.signal.label = '死叉'; scores.signal.desc = 'MA死叉，看跌信号';
            }
        }
        // Breakout/ breakdown signals
        const r30H = parseFloat(kline.r30High);
        const r30L = parseFloat(kline.r30Low);
        if (!isNaN(r30H) && price >= r30H * 0.98) {
            scores.signal.val = Math.min(scores.signal.val + 1, 3);
            if (scores.signal.label === '无信号') { scores.signal.label = '突破'; scores.signal.desc = '接近/突破30日高点'; }
        }
        if (!isNaN(r30L) && price <= r30L * 1.02) {
            scores.signal.val = Math.max(scores.signal.val - 1, -3);
            if (scores.signal.label === '无信号') { scores.signal.label = '破位'; scores.signal.desc = '接近/跌破30日低点'; }
        }
    }

    // --- V12: Fundamental Score (-2 to +2) PE-based ---
    const peVal = parseFloat(data.pe);
    if (!isNaN(peVal) && peVal > 0) {
        if (peVal < 15) {
            scores.fundamental.val = 2; scores.fundamental.label = '低估'; scores.fundamental.desc = 'PE=' + peVal.toFixed(0) + '，明显低估区间';
        } else if (peVal < 25) {
            scores.fundamental.val = 1; scores.fundamental.label = '合理偏低'; scores.fundamental.desc = 'PE=' + peVal.toFixed(0) + '，估值合理偏低';
        } else if (peVal < 40) {
            scores.fundamental.val = 0; scores.fundamental.label = '中性'; scores.fundamental.desc = 'PE=' + peVal.toFixed(0) + '，估值中性';
        } else if (peVal < 80) {
            scores.fundamental.val = -1; scores.fundamental.label = '偏高'; scores.fundamental.desc = 'PE=' + peVal.toFixed(0) + '，估值偏高需谨慎';
        } else {
            scores.fundamental.val = -2; scores.fundamental.label = '高估'; scores.fundamental.desc = 'PE=' + peVal.toFixed(0) + '，估值过高风险大';
        }
    } else if (peVal === 0 || (data.pe && data.pe === '-')) {
        scores.fundamental.val = -1; scores.fundamental.label = '亏损'; scores.fundamental.desc = 'PE为负或无数据，基本面不佳';
    }

    // --- V20c: Momentum (-3 to +3) 超跌反弹=最强买入信号，追涨=风险 ---
    // 真实回测发现：多头+超跌(跌3-7%)→3日胜率52.1%+1.01%(最强!)，追涨→40.7%-0.64%
    const isTrendBull = scores.trend.val >= 1;
    const isTrendBear = scores.trend.val <= -1;
    if (changePct > 7 && changePct < 9.5) {
        // V20c：大涨追高风险大，只有多头趋势下才给正分
        if (isTrendBull) {
            scores.momentum.val = 1; scores.momentum.label = '多头冲高'; scores.momentum.desc = '涨' + changePct.toFixed(1) + '%，多头趋势冲高，注意追高风险';
        } else {
            scores.momentum.val = -1; scores.momentum.label = '冲高回落风险'; scores.momentum.desc = '涨' + changePct.toFixed(1) + '%，非多头冲高，回落风险大';
        }
    } else if (changePct >= 9.5) {
        scores.momentum.val = 3; scores.momentum.label = '涨停'; scores.momentum.desc = '涨停封板，需趋势配合';
    } else if (changePct > 3) {
        // V20c：涨3-7%降分，追涨风险
        if (isTrendBull) {
            scores.momentum.val = 1; scores.momentum.label = '多头偏强'; scores.momentum.desc = '涨' + changePct.toFixed(1) + '%，多头偏强但追高风险';
        } else {
            scores.momentum.val = 0; scores.momentum.label = '非多头追涨'; scores.momentum.desc = '涨' + changePct.toFixed(1) + '%，非多头追涨风险大';
        }
    }
    else if (changePct > 0) { scores.momentum.val = 0; scores.momentum.label = '微涨'; scores.momentum.desc = '涨' + changePct.toFixed(1) + '%，动量中性'; }
    else if (changePct > -3) { scores.momentum.val = -1; scores.momentum.label = '微跌'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%，动量微弱'; }
    else if (changePct > -7) {
        // V25.7: 超跌反弹精细化分档（回测：连跌2-3天胜率73-75%，连跌4天+67.7%，单日暴跌非连跌58.1%）
        var ma5Down = (kline && kline.ma5TurningDown);
        var dd = (kline && kline.downDays) ? kline.downDays : 1; // 连跌天数，默认1
        if (isTrendBull) {
            if (ma5Down) {
                scores.momentum.val = 0; scores.momentum.label = '趋势弱化超跌'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%，多头但MA5拐头，趋势可能反转(回测胜率40%)';
            } else if (dd >= 2 && dd <= 3) {
                scores.momentum.val = 2; scores.momentum.label = '超跌反弹⭐'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%连跌' + dd + '日，多头趋势超跌反弹！回测5日胜率74%';
            } else if (dd >= 4) {
                scores.momentum.val = 1; scores.momentum.label = '超跌反弹(弱)'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%连跌' + dd + '日，反弹力减弱(回测5日胜率68%)';
            } else {
                // 单日暴跌非连跌=58.1%胜率，陷阱
                scores.momentum.val = 0; scores.momentum.label = '单日急跌'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%单日急跌非连跌，反弹信号弱(回测5日胜率58%)';
            }
        } else {
            scores.momentum.val = -2; scores.momentum.label = '恐慌下跌'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%，非多头超跌，恐慌继续';
        }
    }
    else {
        // 跌>7%：多头下深跌反弹有价值
        if (isTrendBull) {
            scores.momentum.val = 1; scores.momentum.label = '深跌反弹'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%，多头深跌或有反弹';
        } else {
            scores.momentum.val = -3; scores.momentum.label = '崩盘'; scores.momentum.desc = '跌' + changePct.toFixed(1) + '%，非多头崩盘，远离';
        }
    }

    // --- V20c: Volume (-3 to +2) 放量跌加重惩罚，高换手危险 ---
    if (turnoverRate > 10) {
        // V20c：换手>10%极危险
        if (changePct < 0) {
            scores.volume.val = -3; scores.volume.label = '巨量抛售'; scores.volume.desc = '换手' + turnoverRate.toFixed(1) + '%巨量下跌，主力出逃';
        } else {
            scores.volume.val = -2; scores.volume.label = '巨量冲高'; scores.volume.desc = '换手' + turnoverRate.toFixed(1) + '%巨量冲高，换手过高风险大';
        }
    } else if (turnoverRate > 5 && changePct > 0) {
        scores.volume.val = 1; scores.volume.label = '放量涨'; scores.volume.desc = '换手' + turnoverRate.toFixed(1) + '%放量上涨，资金积极';
    } else if (turnoverRate > 5 && changePct < 0) {
        scores.volume.val = -3; scores.volume.label = '放量跌⭐'; scores.volume.desc = '换手' + turnoverRate.toFixed(1) + '%放量下跌，抛压极重(回测胜率30%)';
    } else if (turnoverRate < 2 && changePct > 2) {
        scores.volume.val = -1; scores.volume.label = '缩量涨'; scores.volume.desc = '缩量上涨，量能不足需警惕';
    } else if (turnoverRate > 2 && changePct > 0) {
        scores.volume.val = 1; scores.volume.label = '温和量'; scores.volume.desc = '量价配合尚可';
    }

    // --- V25.1: 连续量能过热检测（回测验证：连续2+日量增价涨→3日胜率仅40.4%，低于单日43.5%） ---
    if (kline && kline.volConsecutive >= 2 && scores.volume.val > 0) {
        scores.volume.val -= 1;
        scores.volume.label = scores.volume.val > 0 ? '放量过热' : '量能衰减';
        scores.volume.desc = '连续' + kline.volConsecutive + '日量增价涨，短期过热注意回调(回测胜率40%)';
    }

    // --- Support (-2 to +2) V20c: 区分突破型过热 vs 衰竭型过热 ---
    // 回测发现：多头+过热区3日胜率65.2%，空头+中间仅14.5%
    // 旧逻辑给过热区一律-2，惩罚了最强信号(突破型过热)
    if (kline) {
        const r30Low = parseFloat(kline.r30Low);
        const r30High = parseFloat(kline.r30High);
        if (!isNaN(r30Low) && !isNaN(r30High) && r30High > r30Low) {
            const range = r30High - r30Low;
            const posIn30 = (price - r30Low) / range;
            const isBullishTrend = scores.trend.val >= 1; // 趋势偏多
            const isBearishTrend = scores.trend.val <= -1; // 趋势偏空
            if (posIn30 > 0.85) {
                if (isBullishTrend) {
                    // V20c: 突破型过热——多头趋势+创新高=最强信号
                    scores.support.val = 2; scores.support.label = '突破新高'; scores.support.desc = '多头+30日高位(>' + (posIn30*100).toFixed(0) + '%)，趋势突破信号(回测3日胜率65%)';
                } else if (isBearishTrend) {
                    // 衰竭型过热——空头趋势+高位=诱多陷阱
                    scores.support.val = -2; scores.support.label = '衰竭过热'; scores.support.desc = '空头+30日高位，诱多风险大';
                } else {
                    // 震荡+过热=谨慎
                    scores.support.val = -1; scores.support.label = '过热区'; scores.support.desc = '30日高位(>' + (posIn30*100).toFixed(0) + '%)，趋势不明需谨慎';
                }
            } else if (posIn30 > 0.65) {
                if (isBullishTrend) {
                    scores.support.val = 1; scores.support.label = '突破试探'; scores.support.desc = '多头+接近30日高点' + r30High + '，突破前蓄力';
                } else {
                    scores.support.val = -1; scores.support.label = '近压力'; scores.support.desc = '接近30日高点' + r30High + '，上行压力大';
                }
            } else if (posIn30 < 0.15) {
                if (isBullishTrend) {
                    // 多头回踩低位=买入机会
                    scores.support.val = 2; scores.support.label = '回踩支撑'; scores.support.desc = '多头回踩30日低位，强支撑买入区';
                } else {
                    // 空头+低位=继续破位风险
                    scores.support.val = -1; scores.support.label = '破位风险'; scores.support.desc = '空头+30日低位，可能继续破位';
                }
            } else if (posIn30 < 0.35) {
                scores.support.val = 1; scores.support.label = '近支撑'; scores.support.desc = '接近30日低点' + r30Low + '，有支撑';
            } else {
                scores.support.val = 0; scores.support.label = '中间'; scores.support.desc = '处于30日区间中部';
            }
        }
    }

    // --- V20c: Market Environment (-1 to +2) 反转！暴跌=反弹机会，强势=追高风险 ---
    // 真实回测发现：大盘暴跌后3日胜率79%+2.10%(最强均值回归)，强势日胜率仅39.8%
    if (_marketChg !== null) {
        if (_marketChg > 1.5) { scores.market.val = -1; scores.market.label = '强势追高风险'; scores.market.desc = '大盘+' + _marketChg.toFixed(1) + '%，强势日追高风险大(回测胜率仅39.8%)'; }
        else if (_marketChg > 0) { scores.market.val = 0; scores.market.label = '偏暖'; scores.market.desc = '大盘+' + _marketChg.toFixed(1) + '%，偏暖环境'; }
        else if (_marketChg > -1) { scores.market.val = 1; scores.market.label = '中性偏多'; scores.market.desc = '大盘' + _marketChg.toFixed(1) + '%，中性环境'; }
        else if (_marketChg > -2) { scores.market.val = 1; scores.market.label = '偏冷蓄势'; scores.market.desc = '大盘' + _marketChg.toFixed(1) + '%，偏冷蓄势(回测反弹概率高)'; }
        else { scores.market.val = 2; scores.market.label = '暴跌反弹⭐'; scores.market.desc = '大盘' + _marketChg.toFixed(1) + '%，暴跌日=反弹机会！(回测3日胜率84.8%)'; }
    }

    // --- V20c: Overall = 基础加法 + 反弹共振 + 危险信号扣分 ---
    const signalW = Math.round(scores.signal.val * 1.5);
    const baseScore = scores.trend.val + scores.momentum.val + scores.volume.val + scores.support.val + scores.market.val + scores.fundamental.val + (scores.industry ? scores.industry.val : 0) + signalW;
    
    // V20c：反弹共振——数据驱动，简单有效
    const posDims = [scores.trend, scores.momentum, scores.volume, scores.support, scores.market, scores.signal].filter(d => d.val > 0).length;
    const negDims = [scores.trend, scores.momentum, scores.volume, scores.support, scores.market, scores.signal].filter(d => d.val < 0).length;
    let convergenceBonus = 0;
    // 1. 暴跌日直接加3分（84.8%胜率验证，最强信号）
    if (scores.market.val >= 2) convergenceBonus = 3;
    // 2. 大盘偏正+超跌=反弹窗口，加2分
    else if (scores.market.val > 0 && scores.momentum.val <= 0) convergenceBonus = 2;
    // 3. 3维正=弱共振，加1分
    else if (posDims >= 3) convergenceBonus = 1;
    // 4. 5维以上负=负共振，扣分
    if (negDims >= 5) convergenceBonus = Math.min(convergenceBonus - 4, -4);
    else if (negDims >= 4) convergenceBonus = Math.min(convergenceBonus - 2, -2);
    
    // V20c：危险信号扣分——放量跌+非多头=极度危险
    let dangerPenalty = 0;
    if (scores.volume.val <= -2 && !isTrendBull) dangerPenalty = -3;
    else if (scores.momentum.val >= 2 && scores.market.val < 0) dangerPenalty = -2;
    else if (turnoverRate > 10 && changePct > 0) dangerPenalty = -2;
    
    // V20c保留：强庄识别——大盘弱+个股正=逆势强庄
    let strongHolderBonus = 0;
    if (_marketChg !== null && _marketChg < -0.5 && baseScore >= 4) {
        strongHolderBonus = 2;
    }
    
    scores.overall = baseScore + convergenceBonus + strongHolderBonus + dangerPenalty;
    // V21: 存储中间变量用于三级信号判定
    scores.convergence = convergenceBonus;
    scores.danger = dangerPenalty;
    // V21: 计算正负维度数量
    var pos_dims = 0, neg_dims = 0;
    var dimKeys = ['trend','momentum','volume','support','market','fundamental','industry','sectorHot'];
    dimKeys.forEach(function(k) {
        if (scores[k] && scores[k].val > 0) pos_dims++;
        if (scores[k] && scores[k].val < 0) neg_dims++;
    });
    scores.posDims = pos_dims;
    scores.negDims = neg_dims;

    // V20c：方向判断（调整阈值）
    if (scores.overall >= 8) scores.direction = '偏多';
    else if (scores.overall >= 5) scores.direction = '微多';
    else if (scores.overall >= 2) scores.direction = '观望';
    else if (scores.overall <= -8) scores.direction = '偏空';
    else if (scores.overall <= -5) scores.direction = '微空';
    else if (scores.overall <= -2) scores.direction = '震荡偏空';
    else scores.direction = '震荡';

    // V20c：组合修正方向判定（不改评分，保留维度组合信息）
    const dirLevels = ['偏空','微空','震荡偏空','观望','微多','偏多'];
    // 多头方向等级映射：偏多=5, 微多=4, 观望=3, 震荡偏空=2, 微空=1, 偏空=0
    let dirIdx = dirLevels.indexOf(scores.direction);
    if (dirIdx === -1) dirIdx = 3; // 兜底观望
    // 规则1: momentum=1(追涨)→方向降一级（保护散户不追涨）
    if (scores.momentum && scores.momentum.val === 1) {
        dirIdx = Math.max(0, dirIdx - 1);
    }
    // 规则2: bounce=3(暴跌反弹⭐)→方向升一级（暴跌反弹不被埋没）
    if (scores.bounce && scores.bounce.val === 3) {
        dirIdx = Math.min(5, dirIdx + 1);
    }
    scores.direction = dirLevels[dirIdx];

    // V20c: 持有期
    if (scores.overall >= 8) {
        scores.holdDays = 1; scores.holdReason = '强共振信号→短线1日';
    } else if (scores.overall >= 5) {
        scores.holdDays = 1; scores.holdReason = '偏多信号→短线1日';
    } else if (scores.overall >= 2) {
        scores.holdDays = 0; scores.holdReason = '观望(信号不足)';
    } else if (scores.overall >= -2) {
        scores.holdDays = 0; scores.holdReason = '弱信号→观望';
    } else {
        scores.holdDays = 0; scores.holdReason = '空头信号→不开仓';
    }

    // V21: 三级信号制——中间统一观望，极端才是真信号
    // 强多：≥8分+共振（板块/大盘情绪正向共振）
    if (scores.overall >= 8 && (scores.convergence >= 1 || (scores.mktSentiment && scores.mktSentiment.val >= 1))) {
        scores.signalLevel = 'strong_long';
        scores.signalIcon = '🟢';
        scores.signalLabel = '强多信号';
        scores.signalAction = '可轻仓介入';
    } else if (scores.overall >= 8) {
        scores.signalLevel = 'strong_long';
        scores.signalIcon = '🟢';
        scores.signalLabel = '高分偏多';
        scores.signalAction = '可关注';
    } else if (scores.overall <= -4 || scores.danger <= -3 || (scores.mktSentiment && scores.mktSentiment.label === '追涨危险')) {
        scores.signalLevel = 'danger';
        scores.signalIcon = '🔴';
        scores.signalLabel = '⚠️ 避雷';
        scores.signalAction = '远离！不碰！';
    } else if (scores.overall <= -2 && scores.negDims >= 4) {
        scores.signalLevel = 'danger';
        scores.signalIcon = '🔴';
        scores.signalLabel = '⚠️ 避雷';
        scores.signalAction = '远离！';
    } else {
        scores.signalLevel = 'watch';
        scores.signalIcon = '🟡';
        scores.signalLabel = '观望';
        scores.signalAction = '不操作，继续观察';
    }

    // V21: 更新backtestWR为三级信号制数据
    if (scores.signalLevel === 'strong_long') {
        scores.backtestWR = '回测3日胜率约63%，均收+1.7%';
    } else if (scores.signalLevel === 'extreme_danger') {
        scores.backtestWR = '回测3日胜率约34%，均收-1.7%，大亏率27%+';
    } else if (scores.signalLevel === 'danger') {
        scores.backtestWR = '回测3日胜率约39%，亏损>3%概率20%+';
    } else {
        scores.backtestWR = '中间区域胜率约43-47%(≈抛硬币)，建议观望';
    }

    return scores;
}

function renderScores(scores) {
    if (!scores) return '';
    const items = [
        { key: '趋势', s: scores.trend, max: 3 },
        { key: '动量', s: scores.momentum, max: 3 },
        { key: '量能', s: scores.volume, max: 2 },
        { key: '支撑', s: scores.support, max: 2 },
        { key: '大盘', s: scores.market || {val:0,label:'未知',desc:'未获取'}, max: 2 },
        { key: '基本面', s: scores.fundamental || {val:0,label:'中性',desc:'PE未获取'}, max: 2 },
        { key: '行业', s: scores.industry || {val:0,label:'—',desc:'行业数据获取中'}, max: 2 },
        { key: '板块热度', s: scores.sectorHot || {val:0,label:'—',desc:'板块数据未获取'}, max: 2 },

/* ==================== V11: POST-ANALYSIS VALIDATION ==================== */
function validateAnalysis(text, stockData, klineData, scores) {
    const warnings = [];
    if (!stockData || !text) return warnings;

    const price = parseFloat(stockData.currentPrice);
    const changePct = parseFloat(stockData.changePct);

    // 1. Direction vs score contradiction
    const l1Match = text.match(/【L1方向】\s*(看涨|看空|震荡)/);
    if (l1Match && scores) {
        const llmDir = l1Match[1];
        if (llmDir === '看涨' && scores.trend.val <= -2) {
            warnings.push('⚠️ LLM判断看涨，但规则趋势评分=' + scores.trend.val + '(空头)，存在矛盾');
        }
        if (llmDir === '看涨' && scores.momentum.val <= -2) {
            warnings.push('⚠️ LLM判断看涨，但规则动量评分=' + scores.momentum.val + '(弱势)，存在矛盾');
        }
        if (llmDir === '看空' && scores.trend.val >= 2) {
            warnings.push('⚠️ LLM判断看空，但规则趋势评分=' + scores.trend.val + '(多头)，存在矛盾');
        }
    }

    // 2. Rating vs momentum contradiction
    const l5Match = text.match(/【L5执行】\s*(.*)/);
    if (l5Match && scores) {
        const l5Text = l5Match[1];
        if ((l5Text.includes('买入') || l5Text.includes('强烈推荐')) && scores.momentum.val <= -2) {
            warnings.push('⚠️ LLM给出买入评级，但动量评分=' + scores.momentum.val + '，与弱势矛盾');
        }
        if ((l5Text.includes('卖出') || l5Text.includes('回避')) && scores.momentum.val >= 2) {
            warnings.push('⚠️ LLM给出卖出评级，但动量评分=' + scores.momentum.val + '，与强势矛盾');
        }
    }

    // 3. Event consistency check
    const events = detectEvents(stockData);
    const hasBearishEvent = events.some(e => e.includes('炸板') || e.includes('冲高回落') || e.includes('放量不封板') || e.includes('量价背离'));
    if (hasBearishEvent && l1Match && l1Match[1] === '看涨') {
        warnings.push('⚠️ 检测到看跌事件(炸板/冲高回落/放量不封板/量价背离)，但LLM判断看涨，请谨慎参考');
    }

    // 4. Check if LLM mentions specific price that's far from real
    const priceInText = text.match(/(?:当前价|现价|今日价)[：:]\s*(\d+\.?\d*)/);
    if (priceInText) {
        const mentioned = parseFloat(priceInText[1]);
        if (!isNaN(mentioned) && Math.abs(mentioned - price) / price > 0.03) {
            warnings.push('⚠️ LLM提到的价格' + mentioned + '与真实价格' + price + '偏差>' + '3%，可能编造');
        }
    }

    // 5. V11: Overheat zone check (回测:30日高位胜率仅40%)
    if (scores && scores.support && scores.support.val <= -2) {
        if (l1Match && l1Match[1] === '看涨') {
            warnings.push('⚠️ 30日过热区(支撑评分=' + scores.support.val + ')，回测高位胜率仅40%，不建议看涨');
        }
        if (l5Match && (l5Match[1].includes('买入') || l5Match[1].includes('强烈推荐'))) {
            warnings.push('⚠️ 过热区给出买入评级(支撑=' + scores.support.val + ')，回测高位追涨胜率极低');
        }
    }

    // 6. V11: Market crash check (回测:大盘过滤最强加持)
    if (_marketChg !== null && _marketChg < -2) {
        if (l5Match && (l5Match[1].includes('买入') || l5Match[1].includes('强烈推荐'))) {
            warnings.push('⚠️ 大盘暴跌' + _marketChg.toFixed(1) + '%，注意：暴跌日高分股逆势抗跌=反弹先锋，低分股风险极大');
        }
    }

    // 7. V11: Non-limit-up but >7% surge check (回测:冲高回落风险)
    if (changePct > 7 && changePct < 9.5 && l1Match && l1Match[1] === '看涨') {
        warnings.push('⚠️ 涨幅' + changePct.toFixed(1) + '%但非涨停，冲高回落风险(回测:此类胜率<40%)');
    }

    // 8. V11: Signal vs LLM direction conflict (回测:L6贡献最大)
    if (scores && scores.signal && scores.signal.val >= 2 && l1Match && l1Match[1] === '看空') {
        warnings.push('⚠️ LLM判断看空，但信号评分=' + scores.signal.val + '(金叉/突破)，信号层回测贡献最大(去掉降7.5%)');
    }

    return warnings;
}

/* ==================== V12: LLM OUTPUT FORCE CORRECTION ==================== */
function forceCorrectLLM(text, scores) {
    // V12: Auto-correct LLM outputs that contradict rule scores (execution rate 80%→95%)
    if (!text || !scores) return text;
    let corrected = text;
    let corrections = [];

    // 1. Force: trend≤-2 but LLM says 看涨 → replace with 震荡偏空
    if (scores.trend.val <= -2) {
        if (/【L1方向】\s*看涨/.test(corrected)) {
            corrected = corrected.replace(/【L1方向】\s*看涨/, '【L1方向】震荡偏空[规则纠偏:趋势=' + scores.trend.val + ']');
            corrections.push('L1方向看涨→震荡偏空');
        }
    }

    // 2. Force: momentum≤-2 but LLM says 买入 → replace with 观望
    if (scores.momentum.val <= -2) {
        corrected = corrected.replace(/【L5执行】([^\n]*?)(买入|强烈推荐)/g, function(m, p1, p2) {
            return '【L5执行】' + p1.replace(p2, '观望[规则纠偏:动量=' + scores.momentum.val + ']');
        });
        corrections.push('L5评级买入→观望');
    }

    // 3. Force: signal≥2 but LLM says 看空 → replace with 震荡偏多
    if (scores.signal && scores.signal.val >= 2) {
        if (/【L1方向】\s*看空/.test(corrected)) {
            corrected = corrected.replace(/【L1方向】\s*看空/, '【L1方向】震荡偏多[规则纠偏:信号=' + scores.signal.val + ']');
            corrections.push('L1方向看空→震荡偏多');
        }
    }

    // 4. Force: overheat (support≤-2) + 买入 → replace with 谨慎
    if (scores.support && scores.support.val <= -2) {
        corrected = corrected.replace(/【L5执行】([^\n]*?)(买入|强烈推荐)/g, function(m, p1, p2) {
            return '【L5执行】' + p1.replace(p2, '谨慎[规则纠偏:过热区]');

        corrections.push('L5过热区买入→谨慎');
    }

    // 5. Force: market crash + 买入 → replace with 回避
    if (_marketChg !== null && _marketChg < -2) {
        corrected = corrected.replace(/【L5执行】([^\n]*?)(买入|强烈推荐|推荐)/g, function(m, p1, p2) {
            return '【L5执行】' + p1.replace(p2, '回避[规则纠偏:大盘暴跌]');
        });
        corrections.push('L5暴跌日买入→回避');
    }

    // 6. Force: surge>7% non-limit + 看涨 → add warning tag
    var stockChg = currentStock && currentStock.data ? parseFloat(currentStock.data.changePct) : 0;
    if (stockChg > 7 && stockChg < 9.5) {
        corrected = corrected.replace(/【L1方向】\s*看涨/, '【L1方向】震荡[规则纠偏:冲高回落风险]');
        corrections.push('L1冲高看涨→震荡');
    }

    // V13: 7. Force: industry≤-1 + 强烈推荐 → replace with 谨慎
    if (scores.industry && scores.industry.val <= -1) {
        corrected = corrected.replace(/【L5执行】([^\n]*?)(强烈推荐)/g, function(m, p1, p2) {
            return '【L5执行】' + p1.replace(p2, '谨慎[规则纠偏:行业景气度=' + scores.industry.val + ']');
        });
        corrections.push('L5行业低迷+强烈推荐→谨慎');
    }

    // V20c: 8. Force: sectorHot≤-1(板块拖累) + 强烈推荐 → replace with 谨慎
    if (scores.sectorHot && scores.sectorHot.val <= -1) {
        corrected = corrected.replace(/【L5执行】([^\n]*?)(强烈推荐)/g, function(m, p1, p2) {
            return '【L5执行】' + p1.replace(p2, '谨慎[规则纠偏:板块拖累=' + scores.sectorHot.val + ']');
        });
        corrections.push('L5板块拖累+强烈推荐→谨慎');
    }
    // V20e: 9. Force: 大盘追涨死亡区+强烈推荐 → replace with 谨慎
    if (scores.mktSentiment && scores.mktSentiment.val < 0 && scores.mktSentiment.label === '追涨危险') {
        corrected = corrected.replace(/【L5执行】([^\n]*?)(强烈推荐|推荐买入)/g, function(m, p1, p2) {
            return '【L5执行】' + p1.replace(p2, '谨慎[规则纠偏:追涨死亡区大盘+' + (scores.mktSentiment.chg||0).toFixed(1) + '%]');
        });

    // Store corrections for display
    if (corrections.length > 0) {
        _lastCorrections = corrections;
    }
    return corrected;
}

/* V13: L层智能折叠 — 只展开L1(方向)+L5(执行)，其余折叠 */
function foldLLayers(html) {
    if (!html) return html;
    var layerCfg = {
        'L0': { icon: '🔮', expanded: false },
        'L1': { icon: '🧭', expanded: true },
        'L2': { icon: '📐', expanded: false },
        'L3': { icon: '✅', expanded: false },
        'L4': { icon: '♟️', expanded: false },
        'L5': { icon: '🎯', expanded: true },
        'L6': { icon: '🔍', expanded: false }
    };
    // 匹配【L0-L6】内容块
    var regex = /【(L[0-6][^】]*)】/g;
    var parts = [];
    var lastIdx = 0;
    var match;
    while ((match = regex.exec(html)) !== null) {
        if (lastIdx < match.index) {
            parts.push({ type: 'raw', content: html.substring(lastIdx, match.index) });
        }
        parts.push({ type: 'layer', key: match[1], keyShort: match[1].substring(0, 2), startIdx: match.index + match[0].length });
        lastIdx = match.index + match[0].length;
    }
    if (lastIdx < html.length) {
        parts.push({ type: 'raw', content: html.substring(lastIdx) });
    }
    if (parts.filter(function(p) { return p.type === 'layer'; }).length === 0) return html;

    // Assign content to each layer (up to next layer or end)
    var layers = parts.filter(function(p) { return p.type === 'layer'; });
    for (var i = 0; i < layers.length; i++) {
        var nextIdx = (i + 1 < layers.length) ? parts.indexOf(layers[i + 1]) : parts.length;
        var myIdx = parts.indexOf(layers[i]);
        var content = '';
        for (var j = myIdx; j < nextIdx; j++) {
            if (parts[j].type === 'raw' && j > myIdx) content += parts[j].content;
        }
        layers[i].content = content;
    }

    var result = '';
    // Add raw content before first layer
    var firstLayerIdx = parts.indexOf(layers[0]);
    for (var j = 0; j < firstLayerIdx; j++) {
        if (parts[j].type === 'raw') result += parts[j].content;
    }
    // Build folded layers
    layers.forEach(function(layer) {
        var cfg = layerCfg[layer.keyShort] || { icon: '📋', expanded: false };
        var expCls = cfg.expanded ? ' l-expanded' : '';
        // Determine direction color
        var text = layer.content.replace(/<[^>]*>/g, '');
        var dirCls = 'l-dir-neutral';
        if (text.includes('看涨') || text.includes('买入') || text.includes('强烈推荐')) dirCls = 'l-dir-up';
        else if (text.includes('看空') || text.includes('卖出') || text.includes('回避')) dirCls = 'l-dir-down';
        // Summary for collapsed layers
        var summary = text.trim().substring(0, 50);
        if (summary.length > 45) summary = summary.substring(0, 45) + '...';
        result += '<div class="l-layer' + expCls + '">';
        result += '<div class="l-layer-header ' + dirCls + (cfg.expanded ? ' expanded' : '') + '" onclick="toggleLayer(this)">';
        result += '<span class="l-arrow">▶</span>';
        result += '<span class="l-key-label">' + cfg.icon + ' ' + layer.key + '</span>';
        if (!cfg.expanded && summary) result += '<span style="margin-left:6px;font-weight:400;font-size:11px;opacity:.65">' + escHtml(summary) + '</span>';
        result += '</div>';
        result += '<div class="l-layer-body' + (cfg.expanded ? ' show' : '') + '">' + layer.content + '</div>';
        result += '</div>';
    });
    return result || html;
}

function toggleLayer(header) {
    var layer = header.parentElement;
    var body = header.nextElementSibling;
    layer.classList.toggle('l-expanded');
    header.classList.toggle('expanded');
    body.classList.toggle('show');
}

            // V20f: chip加方向+变化标记 + V23b: 避雷角标
            var dirHtml = '';
            if (item.direction) {
                var dc = item.direction.indexOf('多') >= 0 ? 'var(--green)' : (item.direction.indexOf('空') >= 0 ? 'var(--red)' : 'var(--t3)');
                var db = item.direction.indexOf('多') >= 0 ? 'rgba(74,222,128,.1)' : (item.direction.indexOf('空') >= 0 ? 'rgba(239,68,68,.1)' : 'rgba(255,255,255,.05)');
                var cm = item.changed ? '⚡' : '';
                var dangerTag = (item.score !== undefined && item.score <= -4) ? '🔴' : ((item.score !== undefined && item.score <= -2 && item.direction && item.direction.indexOf('空') >= 0) ? '🟡' : '');
                dirHtml = '<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:'+db+';color:'+dc+';margin-left:2px">'+cm+escHtml(item.direction)+'</span>' + (dangerTag ? '<span style="font-size:8px;margin-left:1px">'+dangerTag+'</span>' : '');

            chip.innerHTML = '<span class="chip-name">' + escHtml(item.name || item.code) + '</span>' +

/* ==================== STOCK SEARCH ==================== */
async function parseStockInput(input) {
    input = input.trim();
    if (/^\d{6}$/.test(input)) return { stockCode: input, stockName: '' };
    try {
        // smartbox API returns v_hint="market~code~name~pinyin~type^..." (script assignment, NOT JSONP)
        const hint = await fetchSmartboxHint(input);
        if (hint) {
            const items = hint.split('^');
            // First pass: prefer GP-A stocks
            for (const item of items) {
                const parts = item.split('~');
                if (parts.length >= 5 && /^\d{6}$/.test(parts[1]) && parts[4] === 'GP-A') {
                    return { stockCode: parts[1], stockName: parts[2] };
                }
            }
            // Second pass: any valid 6-digit code
            for (const item of items) {
                const parts = item.split('~');
                if (parts.length >= 3 && /^\d{6}$/.test(parts[1])) {
                    return { stockCode: parts[1], stockName: parts[2] };
                }
            }
        }
    } catch(e) { console.error('parseStockInput error:', e); }
    return { stockCode: '', stockName: '' };
}

function fetchSmartboxHint(query, timeout) {
    timeout = timeout || 5000;
    return new Promise(function(resolve) {
        var script = document.createElement('script');
        var timer = setTimeout(function() { cleanup(); resolve(''); }, timeout);
        function cleanup() { clearTimeout(timer); if (script.parentNode) script.parentNode.removeChild(script); }
        script.onload = function() {
            cleanup();
            var hint = window.v_hint || '';
            window.v_hint = '';
            resolve(hint);
        };
        script.onerror = function() { cleanup(); resolve(''); };
        script.src = 'https://smartbox.gtimg.cn/s3/?q=' + encodeURIComponent(query) + '&t=all';
        document.head.appendChild(script);
    });
}

/* ==================== JSONP HELPER ==================== */
function jsonpFetch(url, timeout) {
    timeout = timeout || 6000;
    return new Promise(function(resolve, reject) {
        var cb = '_jp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        var script = document.createElement('script');
        var timer = setTimeout(function() { cleanup(); reject(new Error('timeout')); }, timeout);
        function cleanup() { clearTimeout(timer); delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); }
        window[cb] = function(data) { cleanup(); resolve(data); };
        var sep = url.indexOf('?') >= 0 ? '&' : '?';
        script.src = url + sep + 'cb=' + cb;
        script.onerror = function() { cleanup(); reject(new Error('jsonp error')); };
        document.head.appendChild(script);
    });
}

/* ==================== FETCH STOCK DATA (V11: with retry + fallback) ==================== */
function calcMA(arr, period) { var result = []; for (var i = 0; i < arr.length; i++) { if (i < period-1) { result.push(null); continue; } var sum = 0; for (var j = i-period+1; j <= i; j++) sum += arr[j]; result.push(sum/period); } return result; }

async function fetchKlineData(stockCode) {
    return await fetchWithRetry(async function() {
        var market = stockCode.startsWith('6') || stockCode.startsWith('9') ? 1 : 0;
        var prefix = market === 1 ? 'sh' : 'sz';
        var url = 'https://ifzq.gtimg.cn/appstock/app/fqkline/get?param=' + prefix + stockCode + ',day,,,30,qfq';
        var resp = await fetch(url);
        var json = await resp.json();
        if (!json || json.code !== 0) throw new Error('kline error');
        var klines = [];
        try {
            var dayData = json.data[prefix + stockCode];
            if (dayData.qfqday) klines = dayData.qfqday;
            else if (dayData.day) klines = dayData.day;
        } catch(e) { throw new Error('parse error'); }
        if (!klines || klines.length < 2) throw new Error('insufficient data');

        var closes = klines.map(function(k) { return parseFloat(k[2]); });
        var volumes = klines.map(function(k) { return parseInt(k[5]) || 0; });
        var lastClose = closes[closes.length - 1];
        var lastVol = volumes[volumes.length - 1];

        // MA calculation
        var ma5 = calcMA(closes, 5), ma10 = calcMA(closes, 10), ma20 = calcMA(closes, 20), ma60 = calcMA(closes, 60);

        // MA alignment
        var maAlign = '纠缠';
        if (ma5 && ma10 && ma20) {
            var m5 = parseFloat(ma5), m10 = parseFloat(ma10), m20 = parseFloat(ma20);
            if (m5 > m10 && m10 > m20) maAlign = '多头排列';
            else if (m5 < m10 && m10 < m20) maAlign = '空头排列';
        }

        // Cross signal
        var crossSignal = '';
        var ma5TurningDown = false;
        if (klines.length >= 2 && ma5 && ma10) {
            var prevCloses = closes.slice(0, -1);
            var prevMa5 = calcMA(prevCloses, 5);
            var prevMa10 = calcMA(prevCloses, 10);
            if (prevMa5 && prevMa10) {
                if (parseFloat(prevMa5) <= parseFloat(prevMa10) && parseFloat(ma5) > parseFloat(ma10)) crossSignal = '金叉';
                if (parseFloat(prevMa5) >= parseFloat(prevMa10) && parseFloat(ma5) < parseFloat(ma10)) crossSignal = '死叉';
            }
            // V25.5: MA5拐头检测（回测：多头+超跌+MA5拐头胜率40.2% vs MA5上行48.2%，差8pp）
            if (prevMa5 && parseFloat(ma5) < parseFloat(prevMa5)) ma5TurningDown = true;
        }

        // Price position
        var pricePos = '';
        if (ma5 && ma20) {
            pricePos = lastClose > parseFloat(ma5) ? 'MA5上' : 'MA5下';
            pricePos += lastClose > parseFloat(ma20) ? 'MA20上' : 'MA20下';
        }

        // 30-day range
        var r30High = Math.max.apply(null, closes.slice(-30));
        var r30Low = Math.min.apply(null, closes.slice(-30));

        // Volume trend
        var volAvg5 = 0;
        for (var i = Math.max(0, volumes.length - 5); i < volumes.length; i++) volAvg5 += volumes[i];
        volAvg5 = volAvg5 / Math.min(5, volumes.length);
        var volTrend = lastVol > volAvg5 * 1.5 ? '放量' : (lastVol < volAvg5 * 0.5 ? '缩量' : '平量');

        // V25.1: 连续量增价涨天数（回测：连续2+日胜率仅40.4%，过热信号）
        var volConsecutive = 0;
        for (var vi = closes.length - 1; vi > 0; vi--) {
            if (volumes[vi] > volumes[vi-1] && closes[vi] > closes[vi-1]) { volConsecutive++; }
            else break;
        }

        // V25.5: ATR计算 （14日）+ 波动率分层止损
        var atr14 = null;
        var atrPct = 0;
        var highs = klines.map(function(k) { return parseFloat(k[3]); });
        var lows = klines.map(function(k) { return parseFloat(k[4]); });
        if (klines.length >= 15) {
            var trs = [];
            for (var ti = 1; ti < closes.length; ti++) {
                var tr = Math.max(highs[ti] - lows[ti], Math.abs(highs[ti] - closes[ti-1]), Math.abs(lows[ti] - closes[ti-1]));
                trs.push(tr);
            }
            if (trs.length >= 14) {
                var atrSum = 0;
                for (var ai = trs.length - 14; ai < trs.length; ai++) atrSum += trs[ai];
                atr14 = atrSum / 14;
                atrPct = atr14 / lastClose;
            }
        }
        // 波动率分层：高波动(>3%)→2倍ATR止损，低波动→-3%硬止损
        var volTier = atrPct > 0.03 ? 'high' : 'low';
        var smartStopPct = volTier === 'high' ? (atr14 ? (2 * atr14 / lastClose * 100) : 3) : 3;

        // Consecutive days
        var conStr = '';
        var upDays = 0, downDays = 0;
        for (var i = closes.length - 1; i > 0; i--) {
            if (closes[i] > closes[i-1]) { if (downDays > 0) break; upDays++; }
            else if (closes[i] < closes[i-1]) { if (upDays > 0) break; downDays++; }
            else break;
        }
        if (upDays >= 3) conStr = '连涨' + upDays + '日(注意回调)';
        if (downDays >= 3) conStr = '连跌' + downDays + '日(可能超卖)';

        // K-line pattern
        var recentPattern = '';
        if (klines.length >= 3) {
            var last3 = klines.slice(-3);
            var patterns = [];
            for (var k of last3) {
                var o = parseFloat(k[1]), c = parseFloat(k[2]), h = parseFloat(k[3]), l = parseFloat(k[4]);
                var body = Math.abs(c - o), upper = h - Math.max(c, o), lower = Math.min(c, o) - l;
                if (upper > body * 2 && c < o) patterns.push('上影阴线');
                if (lower > body * 2 && c > o) patterns.push('下影阳线');
                if (body < (h - l) * 0.15) patterns.push('十字星');
            }
            if (patterns.length > 0) recentPattern = patterns.join('→');
        }

        return {
            ma5: ma5, ma10: ma10, ma20: ma20, ma60: ma60,
            maAlign: maAlign, crossSignal: crossSignal, pricePos: pricePos, ma5TurningDown: ma5TurningDown,
            r30High: r30High.toFixed(2), r30Low: r30Low.toFixed(2),
            volTrend: volTrend, volConsecutive: volConsecutive, conStr: conStr, recentPattern: recentPattern, rawKlines: klines,
            atr14: atr14 ? atr14.toFixed(3) : null, atrPct: (atrPct * 100).toFixed(1), volTier: volTier, smartStopPct: smartStopPct.toFixed(1),
            downDays: downDays
        };
    }, 2, 1000);
}

/* V13: 行业景气度量化 — 所属行业涨跌排名+上涨占比+个股排名 */
async function fetchIndustryScore(stockCode) {
    return await fetchWithRetry(async function() {
        var secucode = stockCode.startsWith('6') ? '1.' + stockCode : '0.' + stockCode;
        // Step1: 获取行业名称(复用fetchIndustryInfo的数据)
        var infoUrl = 'https://push2.eastmoney.com/api/qt/stock/get?secid=' + secucode + '&fields=f127';
        var infoData = await jsonpFetch(infoUrl, 4000);
        if (!infoData || !infoData.data || !infoData.data.f127) return null;
        var industryName = infoData.data.f127;
        // Step2: 获取同行业股票涨跌排行
        var listUrl = 'https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=20&po=1&np=1&fltt=2&invt=2&fid=f3&fs=b:' + secucode + '&fields=f2,f3,f12,f14';
        var listData = await jsonpFetch(listUrl, 5000);
        if (!listData || !listData.data || !listData.data.diff) return null;
        var peers = listData.data.diff.filter(function(s) { return s.f2 && s.f2 !== '-' && s.f2 !== 0; });
        if (peers.length < 3) return null;
        // Step3: 计算行业指标
        var totalChg = 0, upCount = 0;
        peers.forEach(function(s) { totalChg += (parseFloat(s.f3) || 0); if (parseFloat(s.f3) > 0) upCount++; });
        var avgChg = totalChg / peers.length;
        var upRatio = upCount / peers.length;
        // 找当前股票排名
        var rank = 1;
        for (var i = 0; i < peers.length; i++) {
            if (String(peers[i].f12) === stockCode) { rank = i + 1; break; }
        }
        // Step4: 评分
        var chgScore = avgChg >= 2 ? 2 : (avgChg > 0.5 ? 1 : (avgChg > -0.5 ? 0 : (avgChg >= -2 ? -1 : -2)));
        var ratioScore = upRatio > 0.8 ? 1 : (upRatio >= 0.5 ? 0 : -1);
        var val = Math.max(-2, Math.min(2, chgScore + ratioScore));
        var label = val >= 2 ? '高景气' : (val >= 1 ? '偏暖' : (val === 0 ? '中性' : (val >= -1 ? '偏冷' : '低迷')));
        var desc = label + ' | 均涨' + (avgChg > 0 ? '+' : '') + avgChg.toFixed(2) + '% | 上涨占比' + (upRatio * 100).toFixed(0) + '% | 排名' + rank + '/' + peers.length;
        return { industryName: industryName, avgChg: avgChg, upRatio: upRatio, rank: rank, totalPeers: peers.length, score: { val: val, label: label, desc: desc } };
    }, 1, 800);
}

    var n = klines.length, gap = chartW / n, barW = Math.max(1, Math.floor(gap * 0.65));
    var data = [], hi = -Infinity, lo = Infinity, maxVol = 0;

        var h = parseFloat(klines[i][3]), l = parseFloat(klines[i][4]);
        var v = parseInt(klines[i][5]) || 0;
        data.push({o:o,c:c,h:h,l:l,v:v,d:klines[i][0]});
        hi = Math.max(hi,h); lo = Math.min(lo,l); maxVol = Math.max(maxVol,v);
    }
    var range = hi - lo || 1; hi += range*0.05; lo -= range*0.05; range = hi - lo;
    function pY(p) { return (hi-p)/range*chartH; }
    function vY(v) { return volTop+volH-(v/(maxVol||1))*volH; }
    ctx.fillStyle = "#0d1117"; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = "#1e2d3d"; ctx.lineWidth = 0.5;
    for (var i = 0; i <= 3; i++) {
        var y = chartH*i/3;
        ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        ctx.fillStyle = "#6b7280"; ctx.font = "9px sans-serif"; ctx.textAlign = "left";
        ctx.fillText((hi-range*i/3).toFixed(2), W-padR+4, y+3);
    }
    for (var i = 0; i < n; i++) {
        var d = data[i], x = padL+gap*i+gap/2, isUp = d.c >= d.o;
        var clr = isUp ? "#ef4444" : "#22c55e";
        ctx.strokeStyle = clr; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x,pY(d.h)); ctx.lineTo(x,pY(d.l)); ctx.stroke();
        var top = pY(Math.max(d.o,d.c)), bot = pY(Math.min(d.o,d.c));
        ctx.fillStyle = clr; ctx.fillRect(x-barW/2, top, barW, Math.max(1, bot-top));
        ctx.fillStyle = isUp ? "rgba(239,68,68,0.4)" : "rgba(34,197,94,0.4)";
        ctx.fillRect(x-barW/2, vY(d.v), barW, volTop+volH-vY(d.v));
    }

    var closes = data.map(function(d) { return d.c; });
    var ma5 = calcMA(closes,5), ma10 = calcMA(closes,10), ma20 = calcMA(closes,20);
    function drawMA(maArr, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.beginPath();
        var started = false;
        for (var i = 0; i < n; i++) {
            if (maArr[i] === null) continue;
            var x = padL+gap*i+gap/2, y = pY(maArr[i]);
            if (!started) { ctx.moveTo(x,y); started = true; } else ctx.lineTo(x,y);
        }
        ctx.stroke();
    }
    drawMA(ma5, "#f0c94b"); drawMA(ma10, "#3b82f6"); drawMA(ma20, "#a855f7");
    ctx.fillStyle = "#6b7280"; ctx.font = "9px sans-serif"; ctx.textAlign = "center";
    var step = Math.max(1, Math.ceil(n/6));
    for (var i = 0; i < n; i += step) { ctx.fillText(data[i].d.slice(5), padL+gap*i+gap/2, H-2); }
    ctx.font = "bold 9px sans-serif"; ctx.textAlign = "left";
    ctx.fillStyle = "#f0c94b"; ctx.fillText("MA5", padL+4, 10);
    ctx.fillStyle = "#3b82f6"; ctx.fillText("MA10", padL+34, 10);
    ctx.fillStyle = "#a855f7"; ctx.fillText("MA20", padL+70, 10);
}

function detectEvents(data) {
    if (!data) return [];
    const events = [];
    const price = parseFloat(data.currentPrice);
    const high = parseFloat(data.high);
    const low = parseFloat(data.low);
    const open = parseFloat(data.openPrice);
    const lastClose = parseFloat(data.lastClose);
    const changePct = parseFloat(data.changePct);
    const turnoverRate = parseFloat(data.turnoverRate);
    if (isNaN(price) || isNaN(lastClose)) return events;
    let limitPct = 0.10;
    if (data.code && (data.code.startsWith('688') || data.code.startsWith('300'))) limitPct = 0.20;
    else if (data.name && data.name.includes('ST')) limitPct = 0.05;
    const limitPrice = Math.round(lastClose * (1 + limitPct) * 100) / 100;
    const downLimit = Math.round(lastClose * (1 - limitPct) * 100) / 100;
    if (high >= limitPrice * 0.995 && price < limitPrice * 0.97) events.push('⚠️涨停炸板：最高' + high + '触及涨停价' + limitPrice + '但未能封板，收盘' + price + '，抛压极重');
    const upperWick = high - Math.max(open, price);
    const bodySize = Math.abs(price - open);
    if (upperWick > bodySize * 1.5 && upperWick / lastClose > 0.02) events.push('⚠️冲高回落留长上影：最高' + high + '较收盘' + price + '有显著上影线' + upperWick.toFixed(2) + '元，上方抛压明显');
    if (changePct > 5 && changePct < limitPct * 100 && turnoverRate > 5) events.push('⚠️放量不封板：涨' + changePct + '%但未封涨停，换手' + turnoverRate + '%，有出货嫌疑');
    if (changePct > 3 && turnoverRate < 2) events.push('⚠️量价背离：涨' + changePct + '%但换手仅' + turnoverRate + '%，上涨缺乏量能支撑');
    if (price <= downLimit * 1.005) events.push('🔴跌停：当前价' + price + '接近/触及跌停价' + downLimit);
    if (turnoverRate > 15) events.push('📊异常放量：换手率' + turnoverRate + '%，远超正常水平');
    return events;
}

const CODE_TO_SECTOR = {};

    codes.forEach(c => { CODE_TO_SECTOR[c] = sec; });

async function loadSectorHotness() {
    const el = document.getElementById('sectorScroll');
    if (!el) { console.warn('sectorScroll not ready, retrying...'); setTimeout(loadSectorHotness, 1000); return; }
    try {
        // V20c-fix3: qt.gtimg.cn有CORS，批量查行业龙头（分批避免URL过长）
        const stockMap = {};
        const batchSize = 25;
        for (let i = 0; i < ALL_SECTOR_CODES.length; i += batchSize) {
            const batch = ALL_SECTOR_CODES.slice(i, i + batchSize);
            const url = 'https://qt.gtimg.cn/q=' + batch.join(',');
            const resp = await fetch(url);
            const buf = await resp.arrayBuffer();
            const raw = new TextDecoder('gbk').decode(buf);
            raw.split(';').forEach(line => {
                line = line.trim();
                if (!line || !line.includes('~')) return;
                const eqIdx = line.indexOf('="');
                if (eqIdx < 0) return;
                const prefix = line.substring(0, eqIdx);
                const marketPrefix = prefix.replace('v_','');
                const val = line.substring(eqIdx+2).replace(/"$/,'');
                const p = val.split('~');
                if (p.length > 32) {
                    // p[36]="141.02/854750/11406134354" 最后一段是成交额(元)
                    let amount = 0;
                    if (p[36]) { const ap = String(p[36]).split('/'); if (ap.length > 2) amount = parseFloat(ap[2]) || 0; }
                    stockMap[marketPrefix] = { name:p[1], code:marketPrefix, price:parseFloat(p[3]), chg:parseFloat(p[31]), chg_pct:parseFloat(p[32]), vol:amount, turnover:parseFloat(p[38])||0 };
                }
            });
        }
        // 按行业聚合
        const sectors = [];
        Object.entries(SECTOR_LEADERS).forEach(([secName, codes]) => {
            const stocks = codes.map(c => stockMap[c]).filter(Boolean);
            if (stocks.length === 0) return;
            const avgChg = stocks.reduce((a,s) => a + s.chg_pct, 0) / stocks.length;
            const totalVol = stocks.reduce((a,s) => a + s.vol, 0);
            const topStock = stocks.reduce((a,b) => a.chg_pct > b.chg_pct ? a : b);
            sectors.push({ name:secName, chg:avgChg, amount:totalVol, leadName:topStock.name, leadCode:topStock.code||codes[0], leadChg:topStock.chg_pct, stocks:stocks, codes:codes });
        });
        sectors.sort((a,b) => b.chg - a.chg);
        if (sectors.length === 0) { el.innerHTML = '<div class="sector-loading">暂无板块数据</div>'; return; }
        sectorHotnessCache = sectors;
        renderSectorCards(sectors);
    } catch(e) {
        console.error('loadSectorHotness error:', e);
        el.innerHTML = '<div class="sector-loading">⚠️ 板块数据暂不可用<br><span style="font-size:9px;color:var(--t3)">点击↻重试</span></div>';
    }
}

function renderSectorCards(sectors) {
    const container = document.getElementById('sectorScroll');
    const top12 = sectors.slice(0, 12);
    let html = '';
    top12.forEach((s, idx) => {
        const name = s.name, chg = s.chg, amount = s.amount || 0;
        const tempClass = getSectorTempClass(chg);
        const chgClass = chg > 0 ? 'up' : (chg < 0 ? 'down' : 'flat');
        const chgStr = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
        const amtStr = amount > 0 ? (amount / 1e8).toFixed(1) + '亿' : '';
        const amtColor = chg > 0 ? '#4ade80' : (chg < 0 ? '#f87171' : '#9ca3af');
        html += `<div class="sector-card ${tempClass}" onclick="toggleSectorDetail(${sectors.indexOf(s)})" title="${name}: ${chgStr} 龙头:${s.leadName}">
            <div class="sector-name">${name}</div>
            <div class="sector-chg ${chgClass}">${chgStr}</div>
            ${amtStr ? `<div class="sector-fund" style="color:${amtColor}">${amtStr}</div>` : ''}

    });
    container.innerHTML = html;
}

function getSectorTempClass(chg) {
    if (chg >= 3) return 'hot';

    return 'cold';
}

// V20c核心：4维龙头评分 = 涨幅(30%) + 资金(30%) + 量能(25%) + 封板强度(15%)
// qt.gtimg.cn数据版（CORS可用，主力接口）
function calculateDragonScoresQt(stocks) {
    if (!stocks || stocks.length === 0) return { dragons:[], subs:[], follows:[], weaks:[], avgScore:0 };
    const items = stocks.map(s => ({
        name:s.name, code:(s.code||''), price:s.price||0,
        chg:s.chg_pct||0,
        amount:s.vol||0,
        turnover:s.turnover||0
    }));
    const cV=items.map(s=>s.chg), cR=Math.max(...cV)-Math.min(...cV)||1, cMin=Math.min(...cV);
    items.forEach(s=>{ s.chgScore=((s.chg-cMin)/cR)*30; });
    const aV=items.map(s=>s.amount), aR=Math.max(...aV)-Math.min(...aV)||1, aMin=Math.min(...aV);
    items.forEach(s=>{ s.fundScore=((s.amount-aMin)/aR)*30; });
    const tV=items.map(s=>s.turnover), tR=Math.max(...tV)-Math.min(...tV)||1, tMin=Math.min(...tV);
    items.forEach(s=>{ s.volScore=((s.turnover-tMin)/tR)*25; });
    items.forEach(s=>{
        let raw=0;
        if(s.chg>=9.9) raw=100;
        else if(s.chg>=5) raw=60+(s.chg-5)/5*30;
        else if(s.chg>=0) raw=s.chg/5*50;
        s.sealScore=(raw/100)*15;
    });
    items.forEach(s=>{
        s.dragonScore=Math.round((s.chgScore+s.fundScore+s.volScore+s.sealScore)*10)/10;
    });
    items.sort((a,b)=>b.dragonScore-a.dragonScore);
    const dragons=[],subs=[],follows=[],weaks=[];
    items.forEach(s=>{
        if(s.dragonScore>=70) dragons.push(s);
        else if(s.dragonScore>=50) subs.push(s);
        else if(s.dragonScore>=30) follows.push(s);
        else weaks.push(s);
        s.strongDims=[];
        if(s.chgScore>=20) s.strongDims.push('chg');
        if(s.fundScore>=20) s.strongDims.push('fund');
        if(s.volScore>=15) s.strongDims.push('vol');
        if(s.sealScore>=10) s.strongDims.push('seal');
    });
    const avgScore=items.length>0?(items.reduce((a,s)=>a+s.dragonScore,0)/items.length).toFixed(1):0;
    return { dragons, subs, follows, weaks, avgScore };
}

// 东方财富版（备用）
function calculateDragonScores(stocks, sectorChg, sectorFund) {
    if (!stocks || stocks.length === 0) return { dragons:[], subs:[], follows:[], weaks:[], avgScore:0 };
    // 解析数据
    const items = stocks.map(s => ({
        name:s.f14, code:s.f12, price:s.f2,
        chg:s.f3/100, chgAmt:s.f4,
        turnover:(s.f5||0)/100,   // 换手率%
        amount:s.f6||0,           // 成交额
        amplitude:(s.f7||0)/100,  // 振幅%
        volRatio:s.f8||0,         // 量比
        mainFund:s.f104||0,       // 主力净流入
        retailFund:s.f105||0
    }));
    // --- 维度1: 涨幅评分 (30%) --- 归一化到板块内排名
    const cV=items.map(s=>s.chg), cR=Math.max(...cV)-Math.min(...cV)||1, cMin=Math.min(...cV);
    items.forEach(s=>{ s.chgScore=((s.chg-cMin)/cR)*30; });
    // --- 维度2: 资金评分 (30%) ---
    const fV=items.map(s=>s.mainFund), fR=Math.max(...fV)-Math.min(...fV)||1, fMin=Math.min(...fV);
    items.forEach(s=>{ s.fundScore=((s.mainFund-fMin)/fR)*30; });
    // --- 维度3: 量能评分 (25%) = 换手率(60%)+量比(40%) ---
    const tV=items.map(s=>s.turnover), tR=Math.max(...tV)-Math.min(...tV)||1, tMin=Math.min(...tV);
    const vV=items.map(s=>s.volRatio), vR=Math.max(...vV)-Math.min(...vV)||1, vMin=Math.min(...vV);
    items.forEach(s=>{
        s.volScore=((s.turnover-tMin)/tR*0.6+(s.volRatio-vMin)/vR*0.4)*25;
    });
    // --- 维度4: 封板强度 (15%) ---
    items.forEach(s=>{
        let raw=0;
        if(s.chg>=9.9) raw=100;
        else if(s.chg>=5){ raw=60+(s.chg-5)/5*30; if(s.amplitude>0&&s.amplitude<3) raw=Math.min(90,raw+10); }
        else if(s.chg>=0){ raw=s.chg/5*50; if(s.amplitude>0&&s.amplitude<3) raw=Math.min(50,raw+15); }
        s.sealScore=(raw/100)*15;
    });
    // --- 综合评分 & 排序 ---
    items.forEach(s=>{
        s.dragonScore=Math.round((s.chgScore+s.fundScore+s.volScore+s.sealScore)*10)/10;
    });
    items.sort((a,b)=>b.dragonScore-a.dragonScore);
    // --- 分级: ≥70龙头 ≥50次龙 ≥30跟风 <30弱势 ---
    const dragons=[],subs=[],follows=[],weaks=[];
    items.forEach(s=>{
        if(s.dragonScore>=70) dragons.push(s);
        else if(s.dragonScore>=50) subs.push(s);
        else if(s.dragonScore>=30) follows.push(s);
        else weaks.push(s);
        // 标记优势维度
        s.strongDims=[];
        if(s.chgScore>=20) s.strongDims.push('chg');
        if(s.fundScore>=20) s.strongDims.push('fund');
        if(s.volScore>=15) s.strongDims.push('vol');
        if(s.sealScore>=10) s.strongDims.push('seal');
    });
    const avgScore=items.length>0?(items.reduce((a,s)=>a+s.dragonScore,0)/items.length).toFixed(1):0;
    return { dragons, subs, follows, weaks, avgScore };
}

/* V20c: 板块热度条件融入评分 - 回测验证驱动
   回测结论：板块涨幅>1%是分水岭，高分+板块热胜率48.4% vs 高分+板块冷33%，差15.4pp
   融入方式：作为共振条件加convergenceBonus，不改基础评分，不改阈值 */
function getSectorHotnessForStock(industryName) {
    if (!sectorHotnessCache || !industryName) return null;
    const indLower = industryName.toLowerCase();
    for (const sec of sectorHotnessCache) {
        if (indLower.includes(sec.name) || sec.name.includes(industryName)) {
            return sec;
        }
    }
    const aliases = {'电子':'电子器件','半导体':'半导体','芯片':'半导体','计算机':'计算机','软件':'计算机','通信':'通信','5G':'通信','军工':'军工','航空':'军工','医药':'医药','医疗':'医药','生物':'医药','白酒':'白酒','食品':'食品饮料','饮料':'食品饮料','新能源':'新能源','锂电':'新能源','光伏':'新能源','银行':'银行','券商':'券商','证券':'券商','地产':'房地产','房地产':'房地产','有色':'有色金属','金属':'有色金属','电力':'电力','化工':'化工','化学':'化工','汽车':'汽车','钢铁':'钢铁','煤炭':'煤炭','传媒':'传媒','游戏':'传媒','建材':'建材','水泥':'建材','石油':'石油','石化':'石油','家电':'家电','纺织':'纺织','服装':'纺织','农业':'农业','养殖':'农业'};
    for (const [keyword, sectorName] of Object.entries(aliases)) {
        if (indLower.includes(keyword)) {
            const found = sectorHotnessCache.find(s => s.name === sectorName);
            if (found) return found;
        }
    }
    return null;
}

            if (!m) continue;
            const parts = m[1].split('~');
            if (parts.length < 38) continue;
            
            const stockData = {

                openPrice: parts[5], highPrice: parts[33], lowPrice: parts[34],
                volume: parts[36], amount: parts[37], turnoverRate: parts[38] || '0',
                name: parts[1], code: item.code
            };

            // Fetch kline data

                const kJson = await kResp.json();
                const kInfo = kJson.data[prefix + item.code];
                const dayArr = kInfo && kInfo.qfuaday ? kInfo.qfuaday : (kInfo && kInfo.day ? kInfo.day : []);
                if (dayArr.length >= 5) {
                    const last5 = dayArr.slice(-5);

                    const closes = last20.map(d => parseFloat(d[2]));
                    const last = dayArr[dayArr.length - 1];
                    klineData = {
                        ma5: closes.slice(-5).reduce((a,b)=>a+b,0) / Math.min(5, closes.length),
                        ma10: closes.slice(-10).reduce((a,b)=>a+b,0) / Math.min(10, closes.length),
                        ma20: closes.slice(-20).reduce((a,b)=>a+b,0) / Math.min(20, closes.length),
                        r30High: Math.max(...dayArr.slice(-30).map(d => parseFloat(d[3]))).toFixed(2),
                        r30Low: Math.min(...dayArr.slice(-30).map(d => parseFloat(d[4]))).toFixed(2),
                        volume: last[5] || 0,
